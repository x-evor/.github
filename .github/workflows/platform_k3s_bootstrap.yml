name: Platform k3s Bootstrap

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Bootstrap mode"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - apply
      target_host:
        description: "Inventory host alias"
        required: true
        default: "cn-k3s-vultr.svc.plus"
        type: string
      vars_file:
        description: "Path inside the playbooks repo"
        required: true
        default: "vars/platform_k3s_bootstrap.yml"
        type: string
  push:
    paths:
      - "docs/plans/2026-04-02-single-node-k3s-gitops-platform.md"
      - "docs/operations-governance/release-checklist.md"
      - ".github/workflows/platform_k3s_bootstrap.yml"
      - "scripts/github-actions/run-platform-ansible.sh"
      - "ansible/inventory.ini"
      - "ansible/playbooks/harden_ssh_root_key_only.yml"
      - "ansible/roles/harden_ssh_root_key_only/**"

permissions:
  contents: read

concurrency:
  group: platform-k3s-bootstrap-${{ github.event_name == 'workflow_dispatch' && inputs.target_host || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout control repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Checkout gitops repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.repository_owner }}/gitops
          token: ${{ secrets.WORKSPACE_REPO_TOKEN || github.token }}
          path: gitops

      - name: Checkout charts repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.repository_owner }}/artifacts
          token: ${{ secrets.WORKSPACE_REPO_TOKEN || github.token }}
          path: artifacts

      - name: Install lint tools
        shell: bash
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install yamllint
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.2/kustomize_v5.4.2_linux_amd64.tar.gz | tar -xz
          sudo mv kustomize /usr/local/bin/kustomize

      - name: Validate workflow and ansible yaml
        shell: bash
        run: |
          yamllint -d '{extends: default, rules: {document-start: disable, truthy: disable, line-length: {max: 200}}}' .github/workflows/platform_k3s_bootstrap.yml
          yamllint -d '{extends: default, rules: {document-start: disable, truthy: disable, line-length: {max: 200}}}' ansible/playbooks/deploy_k3s_core_migration.yml

      - name: Validate playbooks syntax
        shell: bash
        run: |
          ANSIBLE_CONFIG=ansible/ansible.cfg ansible-playbook -i ansible/inventory.ini ansible/playbooks/harden_ssh_root_key_only.yml --syntax-check

      - name: Verify helper syntax
        shell: bash
        run: bash -n scripts/github-actions/run-platform-ansible.sh

      - name: Validate gitops renders
        shell: bash
        run: |
          gitops_root="${GITHUB_WORKSPACE}/gitops"
          charts_root="${GITHUB_WORKSPACE}/artifacts/oci/charts"
          cd "${charts_root}"
          helm template console-prod ./apps/app-service -f "${gitops_root}/infra/apps/core/console/base/values.yaml" -f "${gitops_root}/infra/apps/core/console/prod/values.yaml" >/tmp/console.yaml
          helm template accounts-pre ./apps/app-service -f "${gitops_root}/infra/apps/core/accounts/base/values.yaml" -f "${gitops_root}/infra/apps/core/accounts/pre/values.yaml" >/tmp/accounts.yaml
          helm template k3s-platform ./infra/platform/k3s -f "${gitops_root}/infra/platform/k3s-platform/values.yaml" >/tmp/k3s-platform.yaml
          helm template postgresql ./postgresql -f "${gitops_root}/infra/infrastructure/postgresql/values.yaml" >/tmp/postgresql.yaml
          helm template observability ./observability -f "${gitops_root}/infra/observability/observability-stack/values.yaml" >/tmp/observability.yaml

  bootstrap:
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout control repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Checkout playbooks repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.repository_owner }}/playbooks
          token: ${{ secrets.WORKSPACE_REPO_TOKEN || github.token }}
          path: playbooks

      - name: Install Ansible runtime
        shell: bash
        run: bash scripts/github-actions/install-python-tools.sh ansible

      - name: Prepare runner SSH key
        env:
          SINGLE_NODE_VPS_SSH_PRIVATE_KEY: ${{ secrets.SINGLE_NODE_VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 scripts/github-actions/private-key-payload.py normalize > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null

      - name: Bootstrap k3s platform
        env:
          # Stage 1: install and configure k3s.
          ANSIBLE_OVERRIDE_SSH_HOST: ${{ vars.SINGLE_NODE_VPS_SSH_HOST || '' }}
          ANSIBLE_OVERRIDE_SSH_USER: ${{ vars.SINGLE_NODE_VPS_SSH_USER || 'root' }}
          ANSIBLE_OVERRIDE_SSH_PORT: ${{ vars.SINGLE_NODE_VPS_SSH_PORT || '22' }}
          ANSIBLE_OVERRIDE_SSH_KNOWN_HOSTS: ${{ vars.SINGLE_NODE_VPS_SSH_KNOWN_HOSTS }}
          SINGLE_NODE_VPS_SSH_PRIVATE_KEY: ${{ secrets.SINGLE_NODE_VPS_SSH_PRIVATE_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          VAULT_ROOT_TOKEN: ${{ secrets.VAULT_ROOT_TOKEN }}

          # Stage 2: integrate external Vault bootstrap inputs.
          VAULT_URL: ${{ vars.VAULT_URL || '' }}
          VAULT_NAMESPACE: ${{ vars.VAULT_NAMESPACE || '' }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN || '' }}

          # Stage 3: install and configure FluxCD bootstrap.
          GITOPS_REPO: ${{ vars.GITOPS_REPO || 'https://github.com/x-evor/gitops.git' }}
          GITOPS_AUTH_MODE: ${{ secrets.GITOPS_AUTH_MODE || vars.GITOPS_AUTH_MODE || 'public' }}
          GITOPS_FLUX_DEPLOY_KEY: ${{ secrets.GITOPS_FLUX_DEPLOY_KEY }}
          GITOPS_FLUX_DEPLOY_KEY_PUB: ${{ secrets.GITOPS_FLUX_DEPLOY_KEY_PUB }}
        shell: bash
        run: |
          bash scripts/github-actions/run-platform-ansible.sh \
            "${{ inputs.mode }}" \
            "${{ github.workspace }}/ansible/inventory.ini" \
            "${{ github.workspace }}/playbooks/init_k3s_single_node_gitops.yml" \
            "${{ github.workspace }}/playbooks/${{ inputs.vars_file }}" \
            "${{ inputs.target_host }}" \
            "${{ github.workspace }}/ansible/inventory.ini.tmpl"

      - name: Validate k3s and gitops state
        if: inputs.mode == 'apply'
        env:
          SSH_HOST: ${{ vars.SINGLE_NODE_VPS_SSH_HOST || inputs.target_host }}
          SSH_USER: ${{ vars.SINGLE_NODE_VPS_SSH_USER || 'root' }}
          SSH_PORT: ${{ vars.SINGLE_NODE_VPS_SSH_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/id_rsa \
            -p "${SSH_PORT}" \
            -o BatchMode=yes \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            -o StrictHostKeyChecking=yes \
            "${SSH_USER}@${SSH_HOST}" \
            'set -euo pipefail
             export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
             kubectl get nodes -o wide
             kubectl get ns
             kubectl wait --for=condition=Ready node --all --timeout=10m
             kubectl -n flux-system wait --for=condition=Ready pod --all --timeout=10m
             flux reconcile source git platform-config -n flux-system --timeout=5m
             flux reconcile kustomization platform-root -n flux-system --with-source --timeout=10m
             flux get sources git -A
             flux get kustomizations -A
             kubectl get gitrepositories,kustomizations,helmreleases -A
             kubectl get pods -A'
