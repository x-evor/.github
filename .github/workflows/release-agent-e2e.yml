name: Release Agent E2E

on:
  push:
    branches:
      - release/**
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        required: true
        default: pre
        type: choice
        options:
          - pre
          - prod

permissions:
  contents: read

jobs:
  release-critical-path:
    name: release e2e
    runs-on: ubuntu-latest
    env:
      MCP_ENV: ${{ inputs.env || 'pre' }}
      MCP_GATEWAY_BASE_URL: http://127.0.0.1:8080
      INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
      FEATURE_NAME: ${{ github.ref_name }}
      FEATURE_NOTES: Release critical-path validation
      FEATURE_ID: release-${{ github.run_number }}
      REPO_SCOPE: xworkmate.svc.plus,accounts.svc.plus,github-org-cloud-neutral-toolkit
      EVENT_SOURCE: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start MCP Gateway
        shell: bash
        run: bash scripts/github-actions/start-full-stack-gateway.sh

      - name: Run release desktop-e2e target
        shell: bash
        run: bash scripts/github-actions/run-full-stack-test.sh release desktop-e2e-mcp "${{ env.MCP_ENV }}"

      - name: Upload release e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-loop-release-e2e
          path: |
            ${{ runner.temp }}/desktop-e2e-mcp.json
            ${{ runner.temp }}/agent-loop/desktop-e2e-mcp/

      - name: Stop MCP Gateway
        if: always()
        shell: bash
        run: bash scripts/github-actions/stop-full-stack-gateway.sh

  release-load:
    name: release load
    runs-on: ubuntu-latest
    needs: release-critical-path
    env:
      MCP_ENV: ${{ inputs.env || 'pre' }}
      MCP_GATEWAY_BASE_URL: http://127.0.0.1:8080
      INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
      FEATURE_NAME: ${{ github.ref_name }}
      FEATURE_NOTES: Release load validation
      FEATURE_ID: release-${{ github.run_number }}
      REPO_SCOPE: xworkmate.svc.plus,accounts.svc.plus,github-org-cloud-neutral-toolkit
      EVENT_SOURCE: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start MCP Gateway
        shell: bash
        run: bash scripts/github-actions/start-full-stack-gateway.sh

      - name: Run release load target
        shell: bash
        run: bash scripts/github-actions/run-full-stack-test.sh release load-mcp "${{ env.MCP_ENV }}"

      - name: Upload release load artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-loop-release-load
          path: |
            ${{ runner.temp }}/load-mcp.json
            ${{ runner.temp }}/agent-loop/load-mcp/

      - name: Stop MCP Gateway
        if: always()
        shell: bash
        run: bash scripts/github-actions/stop-full-stack-gateway.sh
