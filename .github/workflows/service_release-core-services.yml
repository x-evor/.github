name: Service Release Core Services

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Environment"
        required: true
        default: "pre"
        type: choice
        options:
          - pre
          - prod
      service_ref:
        description: "Branch / tag / sha"
        required: true
        default: "main"
        type: string
      target_host:
        description: "Target_name"
        required: true
        default: "jp-xhttp-contabo.svc.plus"
        type: string
      run_apply:
        description: "Dry Run / Apply"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  dispatch-summary:
    name: "Dispatch Summary"
    runs-on: ubuntu-latest
    steps:
      - name: Write dispatch summary
        shell: bash
        run: |
          if [[ "${{ inputs.track }}" == "pre" ]]; then
            target_environment="PRE"
          else
            target_environment="PROD"
          fi

          if [[ "${{ inputs.run_apply }}" == "true" ]]; then
            execution_mode="Apply"
          else
            execution_mode="Dry Run"
          fi

          {
            echo "## Service Release Core Services"
            echo ""
            echo "- Target environment: \`${target_environment}\`"
            echo "- Target hostname: \`${{ inputs.target_host }}\`"
            echo "- Execution mode: \`${execution_mode}\`"
            echo "- Service ref: \`${{ inputs.service_ref }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy-stunnel-client:
    name: "Deploy stunnel-client"
    needs:
      - dispatch-summary
      - deploy-accounts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout control repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Install Ansible runtime
        uses: ./.github/actions/install-ansible-runtime

      - name: Prepare runner SSH key
        env:
          SINGLE_NODE_VPS_SSH_PRIVATE_KEY: ${{ secrets.SINGLE_NODE_VPS_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 scripts/github-actions/private-key-payload.py normalize > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null

      - name: Deploy stunnel-client
        shell: bash
        env:
          SINGLE_NODE_VPS_SSH_PRIVATE_KEY: ${{ secrets.SINGLE_NODE_VPS_SSH_PRIVATE_KEY }}
          service_image_ref: ${{ vars.STUNNEL_CLIENT_IMAGE || '' }}
        run: |
          args=(
            ansible-playbook
            -i ansible/inventory.ini
            -D
            ansible/playbooks/deploy_stunnel_client.yml
            -l
            "${{ inputs.target_host }}"
          )

          if [[ "${{ inputs.run_apply }}" != "true" ]]; then
            args+=(-C)
          fi

          ANSIBLE_CONFIG="${{ github.workspace }}/ansible/ansible.cfg" "${args[@]}"

