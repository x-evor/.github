name: Service Release Extended Services

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Environment"
        required: true
        default: "pre"
        type: choice
        options:
          - pre
          - prod
      service_ref:
        description: "Branch / tag / sha"
        required: true
        default: "main"
        type: string
      target_host:
        description: "Target_name"
        required: true
        default: "jp-xhttp-contabo.svc.plus"
        type: string
      run_apply:
        description: "Dry Run / Apply"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  deploy-docs:
    name: "Deploy docs.svc.plus"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout control repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Install Ansible runtime
        uses: ./.github/actions/install-ansible-runtime

      - name: Prepare runner SSH key
        env:
          SINGLE_NODE_VPS_SSH_PRIVATE_KEY: ${{ secrets.SINGLE_NODE_VPS_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 scripts/github-actions/private-key-payload.py normalize > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null

      - name: Deploy docs.svc.plus
        shell: bash
        env:
          SINGLE_NODE_VPS_SSH_PRIVATE_KEY: ${{ secrets.SINGLE_NODE_VPS_SSH_PRIVATE_KEY }}
        run: |
          args=(
            ansible-playbook
            -i ansible/inventory.ini
            -D
            ansible/playbooks/deploy_docs_compose.yml
            -l
            "${{ inputs.target_host }}"
          )

          if [[ "${{ inputs.run_apply }}" != "true" ]]; then
            args+=(-C)
          fi

          ANSIBLE_CONFIG="${{ github.workspace }}/ansible/ansible.cfg" "${args[@]}"

  deploy-vault:
    name: "Deploy vault"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout control repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Install Ansible runtime
        uses: ./.github/actions/install-ansible-runtime

      - name: Prepare runner SSH key
        env:
          SINGLE_NODE_VPS_SSH_PRIVATE_KEY: ${{ secrets.SINGLE_NODE_VPS_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 scripts/github-actions/private-key-payload.py normalize > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null

      - name: Deploy vault
        shell: bash
        env:
          SINGLE_NODE_VPS_SSH_PRIVATE_KEY: ${{ secrets.SINGLE_NODE_VPS_SSH_PRIVATE_KEY }}
        run: |
          args=(
            ansible-playbook
            -i ansible/inventory.ini
            -D
            ansible/playbooks/deploy_vault_release.yml
            -l
            "${{ inputs.target_host }}"
          )

          if [[ "${{ inputs.run_apply }}" != "true" ]]; then
            args+=(-C)
          fi

          ANSIBLE_CONFIG="${{ github.workspace }}/ansible/ansible.cfg" "${args[@]}"
