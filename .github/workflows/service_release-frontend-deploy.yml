name: Service Release Console Deploy

on:
  workflow_call:
    inputs:
      track:
        description: "Release track"
        required: true
        type: string
      service_ref:
        description: "Service repository ref (branch/tag/sha)"
        required: true
        type: string
      run_apply:
        description: "Run the final ansible apply stage"
        required: false
        default: false
        type: boolean
      ssh_known_hosts:
        description: "Optional known_hosts payload override"
        required: false
        default: ""
        type: string
      target_host:
        description: "Optional deploy target host override"
        required: false
        default: ""
        type: string
      target_cluster:
        description: "Optional deploy target cluster/alias override"
        required: false
        default: ""
        type: string
      target_domain:
        description: "Optional target domain override"
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      track:
        description: "Release track"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
      service_ref:
        description: "Service repository ref (branch/tag/sha)"
        required: true
        default: "main"
        type: string
      run_apply:
        description: "Run the final ansible apply stage"
        required: true
        default: false
        type: boolean
      ssh_known_hosts:
        description: "Optional known_hosts payload override"
        required: false
        default: ""
        type: string
      target_host:
        description: "Optional deploy target host override"
        required: false
        default: ""
        type: string
      target_cluster:
        description: "Optional deploy target cluster/alias override"
        required: false
        default: ""
        type: string
      target_domain:
        description: "Optional target domain override"
        required: false
        default: ""
        type: string

concurrency:
  group: console-release-${{ inputs.track }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy-console-service:
    name: "Deploy console.svc.plus"
    uses: ./.github/workflows/service_release-service-control-plane-deploy.yml
    with:
      service: console
      track: ${{ inputs.track }}
      service_ref: ${{ inputs.service_ref }}
      run_apply: ${{ inputs.run_apply }}
      ssh_host: ${{ inputs.target_host }}
      ssh_user: "root"
      ssh_port: "22"
      ssh_known_hosts: ${{ inputs.ssh_known_hosts }}
      deploy_server_alias: ${{ inputs.target_cluster }}
      target_domain: ${{ inputs.target_domain }}
    secrets: inherit

# Console release behavior:
# - source checkout comes from x-evor/console.svc.plus via remote-checkout metadata
# - image build/push happens on the GitHub Actions runner during stage-1 prep
# - target host only pulls and starts the published image during apply
