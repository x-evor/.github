name: Deploy Agent Proxy Node

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - deploy
      target_ip:
        description: "Target IP"
        required: true
        default: "46.250.251.132"
      target_domain:
        description: "Target domain"
        required: true
        default: "jp-xhttp-contabo.svc.plus"

permissions:
  contents: read

concurrency:
  group: agent-proxy-node
  cancel-in-progress: false

jobs:
  stage-1-prepare:
    name: "1. Prepare Inputs"
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.prepare.outputs.mode }}
      target_ip: ${{ steps.prepare.outputs.target_ip }}
      target_domain: ${{ steps.prepare.outputs.target_domain }}
    steps:
      - name: Prepare Deployment Inputs
        id: prepare
        shell: bash
        run: |
          case "${{ inputs.mode }}" in
            dry-run|deploy)
              ;;
            *)
              echo "unknown mode: ${{ inputs.mode }}" >&2
              exit 1
              ;;
          esac

          {
            echo "mode=${{ inputs.mode }}"
            echo "target_ip=${{ inputs.target_ip }}"
            echo "target_domain=${{ inputs.target_domain }}"
          } >> "$GITHUB_OUTPUT"

  stage-2-update-release-dns:
    name: "2. Update Release DNS"
    runs-on: ubuntu-latest
    needs: stage-1-prepare
    steps:
      - name: Checkout control repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install Ansible runtime
        shell: bash
        run: bash scripts/github-actions/install-python-tools.sh ansible

      - name: Update Cloudflare DNS
        shell: bash
        env:
          CLOUDFLARE_DNS_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN }}
        run: |
          args=(
            ansible-playbook
            -i ansible/inventory.ini
            -D
            ansible/playbooks/deploy_jp_xhttp_contabo.yml
            --tags agent_proxy_dns
            -e "target_ip=${{ needs.stage-1-prepare.outputs.target_ip }}"
            -e "target_domain=${{ needs.stage-1-prepare.outputs.target_domain }}"
          )

          if [[ "${{ needs.stage-1-prepare.outputs.mode }}" == "dry-run" ]]; then
            args+=(-C)
          fi

          ANSIBLE_CONFIG="${{ github.workspace }}/ansible/ansible.cfg" "${args[@]}"

  stage-3-deploy-node:
    name: "3. Deploy Agent Proxy Node"
    runs-on: ubuntu-latest
    needs:
      - stage-1-prepare
      - stage-2-update-release-dns
    steps:
      - name: Checkout control repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install Ansible runtime
        shell: bash
        run: bash scripts/github-actions/install-python-tools.sh ansible

      - name: Prepare runner SSH key
        env:
          SINGLE_NODE_VPS_SSH_PRIVATE_KEY: ${{ secrets.SINGLE_NODE_VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 scripts/github-actions/private-key-payload.py normalize > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null

      - name: Deploy Agent Proxy Node
        shell: bash
        run: |
          args=(
            ansible-playbook
            -i ansible/inventory.ini
            -D
            ansible/playbooks/deploy_jp_xhttp_contabo.yml
            --tags agent_proxy_node
            -e "target_ip=${{ needs.stage-1-prepare.outputs.target_ip }}"
            -e "target_domain=${{ needs.stage-1-prepare.outputs.target_domain }}"
          )

          if [[ "${{ needs.stage-1-prepare.outputs.mode }}" == "dry-run" ]]; then
            args+=(-C)
          fi

          ANSIBLE_CONFIG="${{ github.workspace }}/ansible/ansible.cfg" "${args[@]}"

  stage-4-verify:
    name: "4. Verify Deployment"
    runs-on: ubuntu-latest
    needs:
      - stage-1-prepare
      - stage-3-deploy-node
    if: ${{ needs.stage-1-prepare.outputs.mode == 'deploy' }}
    steps:
      - name: Verify DNS resolves to target IP
        shell: bash
        run: |
          python3 - <<'PY'
          import ipaddress
          import socket
          import sys

          target_domain = "${{ needs.stage-1-prepare.outputs.target_domain }}"
          target_ip = "${{ needs.stage-1-prepare.outputs.target_ip }}"

          try:
              ipaddress.ip_address(target_ip)
          except ValueError as exc:
              print(f"invalid target_ip: {target_ip}: {exc}", file=sys.stderr)
              sys.exit(1)

          resolved_ips = sorted(set(socket.gethostbyname_ex(target_domain)[2]))
          print(f"{target_domain} resolved to {resolved_ips}")
          if target_ip not in resolved_ips:
              print(f"{target_domain} does not resolve to {target_ip}", file=sys.stderr)
              sys.exit(1)
          PY
