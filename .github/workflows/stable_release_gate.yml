name: Stable Release Gate

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Validation mode"
        required: true
        default: local
        type: choice
        options:
          - local
          - stable
      service:
        description: "Logical service key from config/single-node-release/services/common.yaml"
        required: true
        default: accounts
        type: string
      track:
        description: "Release track"
        required: true
        default: prod
        type: choice
        options:
          - prod
          - preview
      service_ref:
        description: "Service repository ref (branch/tag/sha)"
        required: true
        default: main
        type: string
      stable_url:
        description: "Optional stable smoke URL override"
        required: false
        default: ""
        type: string
      timeout_seconds:
        description: "Smoke timeout in seconds"
        required: false
        default: "10"
        type: string
  workflow_call:
    inputs:
      mode:
        description: "Validation mode"
        required: true
        type: string
      service:
        description: "Logical service key from config/single-node-release/services/common.yaml"
        required: true
        type: string
      track:
        description: "Release track"
        required: true
        type: string
      service_ref:
        description: "Service repository ref (branch/tag/sha)"
        required: true
        type: string
      stable_url:
        description: "Optional stable smoke URL override"
        required: false
        default: ""
        type: string
      timeout_seconds:
        description: "Smoke timeout in seconds"
        required: false
        default: "10"
        type: string

permissions:
  contents: read

jobs:
  release-gate:
    name: "Release Gate (${{ inputs.mode }})"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Control Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: cloud-neutral-toolkit
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install metadata dependencies
        shell: bash
        run: bash ./cloud-neutral-toolkit/scripts/github-actions/install-python-tools.sh metadata

      - name: Run release gate
        shell: bash
        run: |
          set -euo pipefail
          cmd=(
            python3 ./cloud-neutral-toolkit/scripts/github-actions/stable-release-gate.py
            --mode "${{ inputs.mode }}"
            --service "${{ inputs.service }}"
            --track "${{ inputs.track }}"
            --service-ref "${{ inputs.service_ref }}"
            --timeout-seconds "${{ inputs.timeout_seconds }}"
          )
          if [[ -n "${{ inputs.stable_url }}" ]]; then
            cmd+=(--stable-url "${{ inputs.stable_url }}")
          fi
          "${cmd[@]}"
