- name: Install Docker Engine on Debian hosts
  hosts: all
  become: yes
  gather_facts: yes
  tasks:
    - name: Ensure Debian family
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: "This playbook currently supports Debian-family hosts only."

    - name: Select Docker apt repository by distribution
      ansible.builtin.set_fact:
        docker_apt_repo_os: "{{ 'ubuntu' if ansible_distribution == 'Ubuntu' else 'debian' }}"

    - name: Install base dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Ensure apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.list
        mode: "0644"
        content: |
          deb [arch={{ 'amd64' if ansible_architecture in ['x86_64', 'amd64'] else ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ docker_apt_repo_os }} {{ ansible_distribution_release }} stable

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure docker service is enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes
      when: not ansible_check_mode

    - name: Verify docker version
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false
      when: not ansible_check_mode

    - name: Verify docker compose plugin
      ansible.builtin.command: docker compose version
      register: docker_compose_version
      changed_when: false
      when: not ansible_check_mode

    - name: Show installed Docker versions
      ansible.builtin.debug:
        msg:
          - "{{ docker_version.stdout }}"
          - "{{ docker_compose_version.stdout }}"
      when: not ansible_check_mode
