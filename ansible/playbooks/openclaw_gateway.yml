---
- name: Deploy OpenClaw gateway
  hosts: openclaw_gateway
  become: true
  gather_facts: true
  vars:
    action: deploy
    target_host_ip: 46.250.251.132
    openclaw_source_host: openclaw.svc.plus
  pre_tasks:
    - name: Validate requested action
      ansible.builtin.assert:
        that:
          - action in ['deploy', 'migrate']
        fail_msg: "action must be deploy or migrate"

    - name: Validate inventory target IP
      ansible.builtin.assert:
        that:
          - ansible_host == target_host_ip
        fail_msg: "Inventory host ansible_host must match target_host_ip"
  roles:
    - role: openclaw_gateway
      vars:
        openclaw_source_host: "{{ openclaw_source_host }}"
        openclaw_domain: openclaw.svc.plus
        openclaw_service_port: 18789
        openclaw_workspace: /opt/data
        openclaw_data_backend: local
        openclaw_runtime_mode: systemd
        openclaw_manage_caddy: true
        openclaw_manage_dns: true
        openclaw_manage_migration: "{{ action == 'migrate' }}"
        openclaw_migrate_data_dir: "{{ action == 'migrate' }}"
        openclaw_cloudflare_zone_name: svc.plus
        openclaw_cloudflare_record_content: "{{ target_host_ip }}"
        openclaw_cloudflare_api_token: "{{ lookup('env', 'CLOUDFLARE_DNS_API_TOKEN') | default(lookup('env', 'CLOUDFLARE_API_TOKEN'), true) }}"
