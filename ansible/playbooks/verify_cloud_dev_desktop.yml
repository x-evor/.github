- name: Normalize cloud dev desktop request
  hosts: localhost
  connection: local
  gather_facts: true
  roles:
    - role: cloud_vm_request_validate

- name: Verify remote cloud dev desktop
  hosts: cloud_desktop
  gather_facts: true
  become: "{{ os_family != 'windows' }}"
  tasks:
    - name: Verify common Linux workspace marker
      ansible.builtin.stat:
        path: /opt/cloud-dev-desktop/profile.env
      register: common_profile_marker
      when: os_family != "windows"

    - name: Assert Linux profile marker exists
      ansible.builtin.assert:
        that:
          - common_profile_marker.stat.exists
        fail_msg: "Missing /opt/cloud-dev-desktop/profile.env marker on Linux host."
      when: os_family != "windows"

    - name: Verify Fedora GNOME desktop packages
      ansible.builtin.command: rpm -q gnome-shell gtk3-devel clang cmake ninja-build
      changed_when: false
      when: os_family == "fedora-gnome"

    - name: Verify Debian KDE desktop packages
      ansible.builtin.command: dpkg-query -W plasma-desktop qtbase5-dev clang cmake ninja-build
      changed_when: false
      when: os_family == "debian-kde"

    - name: Verify Flutter is installed on Linux
      ansible.builtin.shell: |
        set -euo pipefail
        test -x /opt/flutter/bin/flutter
        /opt/flutter/bin/flutter --version
      args:
        executable: /bin/bash
      changed_when: false
      when:
        - os_family != "windows"
        - toolchains.flutter | bool

    - name: Verify Codex CLI on Windows
      ansible.builtin.raw: |
        $ErrorActionPreference = "Stop"
        Get-Command codex | Out-Null
      changed_when: false
      when: os_family == "windows"

    - name: Verify Flutter on Windows
      ansible.builtin.raw: |
        $ErrorActionPreference = "Stop"
        flutter --version | Out-Null
      changed_when: false
      when:
        - os_family == "windows"
        - toolchains.flutter | bool

    - name: Verify VS Code on Windows
      ansible.builtin.raw: |
        $ErrorActionPreference = "Stop"
        Get-Command code | Out-Null
      changed_when: false
      when:
        - os_family == "windows"
        - toolchains.vscode | bool

    - name: Verify Windows SSH config for peer Linux desktops
      ansible.builtin.raw: |
        $ErrorActionPreference = "Stop"
        $configPath = Join-Path $env:USERPROFILE '.ssh\config'
        if (-not (Test-Path $configPath)) {
          throw "Missing SSH config: $configPath"
        }
        {% for alias in windows_ssh_host_aliases | default([]) %}
        ssh -G {{ alias }} | Out-Null
        if ($LASTEXITCODE -ne 0) {
          throw "Failed to resolve SSH host alias {{ alias }}"
        }
        {% endfor %}
      changed_when: false
      when:
        - os_family == "windows"
        - windows_ssh_host_aliases is defined
        - (windows_ssh_host_aliases | length) > 0
