---
- name: Validate agent proxy deployment inputs
  ansible.builtin.assert:
    that:
      - agent_proxy_domain | length > 0
      - agent_proxy_target_ip | length > 0
      - agent_proxy_auth_url | length > 0
      - agent_proxy_standalone | bool or agent_proxy_internal_service_token | length > 0
    fail_msg: "Invalid agent proxy deployment configuration"

- name: Validate inventory target IP
  ansible.builtin.assert:
    that:
      - ansible_host == agent_proxy_target_ip
    fail_msg: "Inventory host ansible_host must match agent_proxy_target_ip"

- name: Download setup-proxy script
  ansible.builtin.get_url:
    url: "{{ agent_proxy_script_url }}"
    dest: "{{ agent_proxy_script_path }}"
    mode: "0755"

- name: Run setup-proxy script
  ansible.builtin.shell: |
    set -euo pipefail
    args=(--node "{{ agent_proxy_domain }}")

    if [ "{{ agent_proxy_upgrade_only | bool | ternary('true', 'false') }}" = "true" ]; then
      args+=(--upgrade-only)
    fi

    if [ "{{ agent_proxy_open_stunnel_5443 | bool | ternary('true', 'false') }}" = "true" ]; then
      args+=(--open-stunnel-5443)
    fi

    if [ "{{ agent_proxy_standalone | bool | ternary('true', 'false') }}" = "true" ]; then
      args+=(--standalone)
    fi

    "{{ agent_proxy_script_path }}" "${args[@]}"
  args:
    executable: /bin/bash
  environment:
    AUTH_URL: "{{ agent_proxy_auth_url }}"
    INTERNAL_SERVICE_TOKEN: "{{ agent_proxy_internal_service_token }}"
    OPEN_STUNNEL_5443: "{{ agent_proxy_open_stunnel_5443 | bool | ternary('true', 'false') }}"
  register: agent_proxy_setup_result
  changed_when: true

- name: Show setup-proxy result summary
  ansible.builtin.debug:
    msg:
      - "setup-proxy domain: {{ agent_proxy_domain }}"
      - "setup-proxy target: {{ agent_proxy_target_ip }}"
      - "stdout tail: {{ (agent_proxy_setup_result.stdout_lines | default([]))[-10:] }}"
