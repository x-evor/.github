- name: Validate caddy site inputs
  ansible.builtin.assert:
    that:
      - caddy_site_name | length > 0
      - caddy_site_domains | length > 0
      - caddy_site_upstream | length > 0

- name: Render Caddy site file
  ansible.builtin.template:
    src: site.caddy.j2
    dest: "{{ caddy_site_conf_dir }}/{{ caddy_site_name }}.caddy"
    mode: "0644"

- name: Validate Caddy configuration after updating {{ caddy_site_name }}
  ansible.builtin.command: caddy validate --config /etc/caddy/Caddyfile
  changed_when: false
  when: not ansible_check_mode

- name: Reload Caddy after updating {{ caddy_site_name }}
  ansible.builtin.shell: "{{ caddy_site_reload_command }}"
  args:
    executable: /bin/bash
  changed_when: true
  when: not ansible_check_mode
