- name: Pull and start compose stack
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ compose_migration_project_dir }}"
    docker compose -p "{{ compose_migration_project_name }}" pull
    docker compose -p "{{ compose_migration_project_name }}" up -d
  args:
    executable: /bin/bash
  when:
    - not ansible_check_mode
    - compose_migration_apply | bool
