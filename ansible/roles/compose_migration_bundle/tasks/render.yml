- name: Ensure project directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ compose_migration_project_dir }}"
    - "{{ compose_migration_project_dir }}/apisix"
    - "{{ compose_migration_project_dir }}/env"
    - "{{ compose_migration_project_dir }}/stunnel"

- name: Render non-secret compose files locally and copy to host
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.template', manifest.src) }}"
    dest: "{{ compose_migration_project_dir }}/{{ manifest.dest }}"
    mode: "{{ manifest.mode | default('0644') }}"
  loop:
    - { src: "docker-compose.yaml.j2", dest: "docker-compose.yaml" }
    - { src: "apisix.yaml.j2", dest: "apisix/apisix.yaml", mode: "0666" }
    - { src: "config.yaml.j2", dest: "apisix/config.yaml", mode: "0666" }
    - { src: "Caddyfile.j2", dest: "Caddyfile" }
    - { src: "stunnel.conf.j2", dest: "stunnel/stunnel.conf" }
  loop_control:
    loop_var: manifest
    label: "{{ manifest.dest }}"

- name: Render secret env files locally and copy to host
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.template', manifest.src) }}"
    dest: "{{ compose_migration_project_dir }}/{{ manifest.dest }}"
    mode: "{{ manifest.mode | default('0600') }}"
  loop:
    - { src: "accounts.env.j2", dest: "env/accounts.env", mode: "0600" }
    - { src: "rag-server.env.j2", dest: "env/rag-server.env", mode: "0600" }
  loop_control:
    loop_var: manifest
    label: "{{ manifest.dest }}"
  no_log: true

- name: Render DNS provider env if configured
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.template', 'dns-provider.env.j2') }}"
    dest: "{{ compose_migration_project_dir }}/env/dns-provider.env"
    mode: "0600"
  when:
    - compose_migration_dns_provider is defined
    - compose_migration_dns_provider | length > 0
  no_log: true
