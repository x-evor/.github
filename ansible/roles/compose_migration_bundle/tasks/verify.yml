- name: Show compose status
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ compose_migration_project_dir }}"
    docker compose -p "{{ compose_migration_project_name }}" ps
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - not ansible_check_mode
    - compose_migration_apply | bool
