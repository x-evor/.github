- name: Install Fedora Flutter GTK dependencies
  ansible.builtin.dnf:
    name:
      - clang
      - cmake
      - ninja-build
      - pkgconf-pkg-config
      - gtk3-devel
      - libblkid-devel
      - liblzma-devel
      - make
      - patch
      - unzip
    state: present

- name: Install Flutter SDK on Fedora
  ansible.builtin.unarchive:
    src: "{{ flutter_sdk_url | default('https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.29.0-stable.tar.xz') }}"
    dest: /opt
    remote_src: true
    creates: /opt/flutter/bin/flutter

- name: Verify Flutter doctor on Fedora
  ansible.builtin.command: /opt/flutter/bin/flutter doctor -v
  changed_when: false
  when: not ansible_check_mode

