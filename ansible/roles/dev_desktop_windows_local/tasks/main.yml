- name: Install Azure CLI and Google Cloud CLI on local Windows machine
  ansible.builtin.import_role:
    name: cloud_cli_prereqs

- name: Verify Azure CLI on local Windows machine
  ansible.builtin.raw: |
    $ErrorActionPreference = "Stop"
    az version | Out-Null
  changed_when: false
  when: not ansible_check_mode

- name: Verify Google Cloud CLI on local Windows machine
  ansible.builtin.raw: |
    $ErrorActionPreference = "Stop"
    gcloud version | Out-Null
  changed_when: false
  when: not ansible_check_mode

