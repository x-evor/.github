- name: Validate DNS update inputs
  ansible.builtin.assert:
    that:
      - dns_update_provider == 'cloudflare'
      - dns_update_records is sequence
      - dns_update_records | length > 0
      - dns_update_zone_name | length > 0 or dns_update_zone_id | length > 0

- name: Update DNS records with Cloudflare role
  ansible.builtin.include_role:
    name: cloudflare_dns
  vars:
    cloudflare_dns_zone_name: "{{ dns_update_zone_name }}"
    cloudflare_dns_zone_id: "{{ dns_update_zone_id }}"
    cloudflare_dns_api_token: "{{ dns_update_api_token }}"
    cloudflare_dns_records: "{{ dns_update_records }}"
