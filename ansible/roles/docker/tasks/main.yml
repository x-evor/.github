- name: Validate docker compose runtime inputs
  ansible.builtin.assert:
    that:
      - docker_project_dir | length > 0
      - docker_project_name | length > 0
      - docker_compose_file | length > 0

- name: Log in to remote image registry when credentials are configured
  ansible.builtin.shell: |
    set -euo pipefail
    printf '%s' '{{ docker_registry_password }}' | docker login {{ docker_registry_server }} \
      --username '{{ docker_registry_username }}' \
      --password-stdin
  args:
    executable: /bin/bash
  when:
    - docker_login_when_configured | bool
    - docker_registry_server | length > 0
    - docker_registry_username | length > 0
    - docker_registry_password | length > 0
    - not ansible_check_mode
  changed_when: true
  no_log: true
