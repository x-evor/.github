docker_compose_lite_project_dir: /opt/cloud-neutral/docker-compose-lite
docker_compose_lite_project_name: cn-toolkit-lite
docker_compose_lite_apply: true
docker_compose_lite_verify_tls: false

docker_compose_lite_accounts_image: REPLACE_ACCOUNTS_IMAGE
docker_compose_lite_rag_image: REPLACE_RAG_SERVER_IMAGE

docker_compose_lite_domain: svc.plus
docker_compose_lite_db_tls_host: postgresql-aws.svc.plus
docker_compose_lite_db_tls_port: 5443
docker_compose_lite_dns_provider: ""
docker_compose_lite_dns_provider_env: {}
docker_compose_lite_dns_zone: svc.plus
docker_compose_lite_registry_server: ghcr.io
docker_compose_lite_registry_username: ""
docker_compose_lite_registry_password: ""
docker_compose_lite_pull_images: true

docker_compose_lite_accounts_env:
  CONFIG_TEMPLATE: /app/config/account.cloudrun.yaml
  DB_USER: postgres
  DB_NAME: account
  DB_PASSWORD: REPLACE_ME
  SMTP_HOST: smtp.qq.com
  SMTP_PORT: "587"
  SMTP_FROM: XControl Account <example@example.com>
  SMTP_USERNAME: REPLACE_ME
  SMTP_PASSWORD: REPLACE_ME

docker_compose_lite_rag_env:
  DB_USER: postgres
  DB_NAME: knowledge_db
  DB_PASSWORD: REPLACE_ME
  POSTGRES_DB: knowledge_db
  NVIDIA_API_KEY: REPLACE_ME
  DATABASE_URL: REPLACE_ME
