- name: Check Docker is installed
  ansible.builtin.command: docker --version
  register: docker_check
  changed_when: false
  failed_when: false

- name: Fail if Docker is not installed
  ansible.builtin.fail:
    msg: "Docker is not installed. Please install Docker first."
  when: docker_check.rc != 0

- name: Remove conflicting legacy containers
  ansible.builtin.shell: |
    set -euo pipefail
    docker rm -f \
      cn-toolkit-caddy \
      cn-toolkit-apisix \
      cn-toolkit-accounts \
      cn-toolkit-rag-server \
      cn-toolkit-stunnel-client 2>/dev/null || true
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - not ansible_check_mode
    - docker_compose_lite_apply | bool

- name: Login to container registry when credentials are provided
  ansible.builtin.shell: |
    set -euo pipefail
    echo "{{ docker_compose_lite_registry_password }}" | docker login "{{ docker_compose_lite_registry_server }}" \
      --username "{{ docker_compose_lite_registry_username }}" \
      --password-stdin
  args:
    executable: /bin/bash
  no_log: true
  when:
    - not ansible_check_mode
    - docker_compose_lite_apply | bool
    - docker_compose_lite_registry_username | length > 0
    - docker_compose_lite_registry_password | length > 0

- name: Pull and start compose stack
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ docker_compose_lite_project_dir }}"
    if {{ (docker_compose_lite_pull_images | bool) | ternary('true', 'false') }}; then
      docker compose -p "{{ docker_compose_lite_project_name }}" pull
    fi
    docker compose -p "{{ docker_compose_lite_project_name }}" up -d
  args:
    executable: /bin/bash
  when:
    - not ansible_check_mode
    - docker_compose_lite_apply | bool
