- name: Check Docker is installed
  ansible.builtin.shell: |
    set -euo pipefail
    docker --version
  args:
    executable: /bin/bash
  changed_when: false
  register: docker_version_check
  failed_when: false

- name: Fail if Docker is not installed
  ansible.builtin.fail:
    msg: "Docker is not installed on the target host. Install Docker Engine before running Docker Compose migration validation."
  when: docker_version_check.rc != 0

- name: Validate docker compose config
  ansible.builtin.shell: |
    set -euo pipefail
    cd "{{ docker_compose_lite_project_dir }}"
    docker compose -p "{{ docker_compose_lite_project_name }}" config
  args:
    executable: /bin/bash
  changed_when: false
  register: docker_compose_config_output

- name: Show docker compose config validation result
  ansible.builtin.debug:
    var: docker_compose_config_output.stdout_lines
    verbosity: 1

- name: Show rendered files location
  ansible.builtin.debug:
    msg: "Rendered files in {{ docker_compose_lite_project_dir }} - use 'ansible ... -v' to see config output"
