- name: Run compose migration bundle
  ansible.builtin.include_role:
    name: migration
  vars:
    migration_runtime: docker
    migration_apply: "{{ docker_compose_lite_apply }}"
    migration_project_dir: "{{ docker_compose_lite_project_dir }}"
    migration_project_name: "{{ docker_compose_lite_project_name }}"
    migration_accounts_image: "{{ docker_compose_lite_accounts_image }}"
    migration_rag_image: "{{ docker_compose_lite_rag_image }}"
    migration_db_tls_host: "{{ docker_compose_lite_db_tls_host }}"
    migration_db_tls_port: "{{ docker_compose_lite_db_tls_port }}"
    migration_dns_provider: "{{ docker_compose_lite_dns_provider }}"
    migration_dns_zone: "{{ docker_compose_lite_dns_zone }}"
    migration_dns_token: "{{ lookup('ansible.builtin.env', 'CLOUDFLARE_DNS_API_TOKEN') | default('', true) }}"
    migration_dns_records:
      - type: A
        name: accounts.svc.plus
        content: 127.0.0.1
        proxied: false
      - type: A
        name: rag-server.svc.plus
        content: 127.0.0.1
        proxied: false
    migration_accounts_env: "{{ docker_compose_lite_accounts_env }}"
    migration_rag_env: "{{ docker_compose_lite_rag_env }}"
