- name: Validate accounts image is set for apply
  ansible.builtin.assert:
    that:
      - docker_compose_lite_accounts_image | length > 0
      - docker_compose_lite_accounts_image != "REPLACE_ACCOUNTS_IMAGE"
    fail_msg: "Set docker_compose_lite_accounts_image to a real image before apply."
  when: docker_compose_lite_apply | bool

- name: Validate rag image is set for apply
  ansible.builtin.assert:
    that:
      - docker_compose_lite_rag_image | length > 0
      - docker_compose_lite_rag_image != "REPLACE_RAG_SERVER_IMAGE"
    fail_msg: "Set docker_compose_lite_rag_image to a real image before apply."
  when: docker_compose_lite_apply | bool

- name: Validate accounts required env values for apply
  ansible.builtin.assert:
    that:
      - docker_compose_lite_accounts_env.DB_PASSWORD | default('') not in ['', 'REPLACE_ME', 'CHANGE_ME']
      - docker_compose_lite_accounts_env.SMTP_USERNAME | default('') not in ['', 'REPLACE_ME', 'CHANGE_ME']
      - docker_compose_lite_accounts_env.SMTP_PASSWORD | default('') not in ['', 'REPLACE_ME', 'CHANGE_ME']
    fail_msg: "Set real accounts env values before apply."
  when: docker_compose_lite_apply | bool

- name: Validate rag required env values for apply
  ansible.builtin.assert:
    that:
      - docker_compose_lite_rag_env.DB_PASSWORD | default('') not in ['', 'REPLACE_ME', 'CHANGE_ME']
      - docker_compose_lite_rag_env.NVIDIA_API_KEY | default('') not in ['', 'REPLACE_ME', 'CHANGE_ME']
    fail_msg: "Set real rag env values before apply."
  when: docker_compose_lite_apply | bool
