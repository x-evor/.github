k3s_core_namespace: core-platform
k3s_core_infra_namespace: infra-system
k3s_core_cluster_issuer: letsencrypt-prod
k3s_core_kubeconfig: /etc/rancher/k3s/k3s.yaml
k3s_core_root_domain: svc.plus
k3s_core_preview_sha: preview
k3s_core_apply_preview: true
k3s_core_verify_tls: true
k3s_core_workdir: /tmp/k3s-core-migration
k3s_core_render_only: false

k3s_core_dns_secret:
  name: externaldns-provider
  namespace: infra-system
  string_data: {}

k3s_core_shared_stunnel:
  enabled: true
  host: postgresql.svc.plus
  port: 443
  accept_port: 15432
  namespace: core-platform
  image: dweomer/stunnel

k3s_core_services:
  - name: accounts
    image: REPLACE_IMAGE
    namespace: core-platform
    port: 8080
    stable_host: stable-accounts.svc.plus
    preview_host: preview-{{ k3s_core_preview_sha }}.svc.plus
    request_cpu: 220m
    request_memory: 320Mi
    limit_cpu: 700m
    limit_memory: 512Mi
    config:
      APP_MODE: production
      DB_HOST: stunnel-client.core-platform.svc.cluster.local
      DB_PORT: "15432"
    secret: {}

  - name: rag-server
    image: REPLACE_IMAGE
    namespace: core-platform
    port: 8080
    stable_host: stable-rag-server.svc.plus
    preview_host: preview-{{ k3s_core_preview_sha }}.svc.plus
    request_cpu: 180m
    request_memory: 224Mi
    limit_cpu: 500m
    limit_memory: 448Mi
    config:
      DB_HOST: stunnel-client.core-platform.svc.cluster.local
      DB_PORT: "15432"
    secret: {}

  - name: x-scope-hub
    image: REPLACE_IMAGE
    namespace: core-platform
    port: 8080
    stable_host: stable-x-scope-hub.svc.plus
    preview_host: preview-{{ k3s_core_preview_sha }}.svc.plus
    request_cpu: 200m
    request_memory: 256Mi
    limit_cpu: 400m
    limit_memory: 384Mi
    config: {}
    secret: {}

  - name: x-cloud-flow
    image: REPLACE_IMAGE
    namespace: core-platform
    port: 8080
    stable_host: stable-x-cloud-flow.svc.plus
    preview_host: preview-{{ k3s_core_preview_sha }}.svc.plus
    request_cpu: 150m
    request_memory: 192Mi
    limit_cpu: 400m
    limit_memory: 320Mi
    config: {}
    secret: {}

  - name: x-ops-agent
    image: REPLACE_IMAGE
    namespace: core-platform
    port: 8080
    stable_host: stable-x-ops-agent.svc.plus
    preview_host: preview-{{ k3s_core_preview_sha }}.svc.plus
    request_cpu: 150m
    request_memory: 192Mi
    limit_cpu: 400m
    limit_memory: 320Mi
    config: {}
    secret: {}
