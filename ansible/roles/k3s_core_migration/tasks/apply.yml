- name: Apply ExternalDNS secret manifest
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ k3s_core_kubeconfig }}"
    kubectl apply -f "{{ k3s_core_workdir }}/externaldns-secret.yaml"
  args:
    executable: /bin/bash
  when:
    - not ansible_check_mode
    - not k3s_core_render_only
    - k3s_core_dns_secret.string_data | length > 0

- name: Apply shared stunnel manifests
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ k3s_core_kubeconfig }}"
    kubectl apply -f "{{ k3s_core_workdir }}/stunnel-configmap.yaml"
    kubectl apply -f "{{ k3s_core_workdir }}/stunnel-deployment.yaml"
    kubectl apply -f "{{ k3s_core_workdir }}/stunnel-service.yaml"
  args:
    executable: /bin/bash
  when:
    - not ansible_check_mode
    - not k3s_core_render_only
    - k3s_core_shared_stunnel.enabled

- name: Apply stable manifests
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ k3s_core_kubeconfig }}"
    kubectl apply -f "{{ k3s_core_workdir }}/{{ item.name }}-configmap.yaml"
    kubectl apply -f "{{ k3s_core_workdir }}/{{ item.name }}-secret.yaml"
    kubectl apply -f "{{ k3s_core_workdir }}/{{ item.name }}-deployment.yaml"
    kubectl apply -f "{{ k3s_core_workdir }}/{{ item.name }}-service.yaml"
    kubectl apply -f "{{ k3s_core_workdir }}/{{ item.name }}-ingress.yaml"
  args:
    executable: /bin/bash
  loop: "{{ k3s_core_services }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - not ansible_check_mode
    - not k3s_core_render_only

- name: Apply preview manifests
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ k3s_core_kubeconfig }}"
    kubectl apply -f "{{ k3s_core_workdir }}/{{ item.name }}-preview-deployment.yaml"
    kubectl apply -f "{{ k3s_core_workdir }}/{{ item.name }}-preview-service.yaml"
    kubectl apply -f "{{ k3s_core_workdir }}/{{ item.name }}-preview-ingress.yaml"
  args:
    executable: /bin/bash
  loop: "{{ k3s_core_services }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - not ansible_check_mode
    - not k3s_core_render_only
    - k3s_core_apply_preview
