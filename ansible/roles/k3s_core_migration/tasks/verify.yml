- name: Wait for stable deployments to become available
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ k3s_core_kubeconfig }}"
    kubectl -n {{ item.namespace }} rollout status deployment/{{ item.name }} --timeout=180s
  args:
    executable: /bin/bash
  loop: "{{ k3s_core_services }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - not ansible_check_mode
    - not k3s_core_render_only

- name: Wait for preview deployments to become available
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ k3s_core_kubeconfig }}"
    kubectl -n {{ item.namespace }} rollout status deployment/{{ item.name }}-preview --timeout=180s
  args:
    executable: /bin/bash
  loop: "{{ k3s_core_services }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - not ansible_check_mode
    - not k3s_core_render_only
    - k3s_core_apply_preview

- name: Verify stable hosts
  ansible.builtin.uri:
    url: "https://{{ item.stable_host }}/healthz"
    method: GET
    validate_certs: "{{ k3s_core_verify_tls }}"
    status_code: [200, 301, 302, 401, 403]
  register: k3s_core_stable_verify
  retries: 5
  delay: 5
  until: k3s_core_stable_verify.status in [200, 301, 302, 401, 403]
  loop: "{{ k3s_core_services }}"
  loop_control:
    label: "{{ item.stable_host }}"
  when:
    - not ansible_check_mode
    - not k3s_core_render_only

- name: Verify preview hosts
  ansible.builtin.uri:
    url: "https://{{ item.preview_host }}/healthz"
    method: GET
    validate_certs: "{{ k3s_core_verify_tls }}"
    status_code: [200, 301, 302, 401, 403]
  register: k3s_core_preview_verify
  retries: 5
  delay: 5
  until: k3s_core_preview_verify.status in [200, 301, 302, 401, 403]
  loop: "{{ k3s_core_services }}"
  loop_control:
    label: "{{ item.preview_host }}"
  when:
    - not ansible_check_mode
    - not k3s_core_render_only
    - k3s_core_apply_preview
