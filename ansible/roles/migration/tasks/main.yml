- name: Validate migration runtime selection
  ansible.builtin.assert:
    that:
      - migration_runtime in ['docker', 'systemd', 'k3s', 'k8s']
    fail_msg: "migration_runtime must be docker, systemd, k3s, or k8s."

- name: Run Docker migration path
  ansible.builtin.include_role:
    name: compose_migration_bundle
  vars:
    compose_migration_apply: "{{ migration_apply }}"
    compose_migration_project_dir: "{{ migration_project_dir }}"
    compose_migration_project_name: "{{ migration_project_name }}"
    compose_migration_accounts_image: "{{ migration_accounts_image }}"
    compose_migration_rag_image: "{{ migration_rag_image }}"
    compose_migration_db_tls_host: "{{ migration_db_tls_host }}"
    compose_migration_db_tls_port: "{{ migration_db_tls_port }}"
    compose_migration_dns_provider: "{{ migration_dns_provider }}"
    compose_migration_dns_zone: "{{ migration_dns_zone }}"
    compose_migration_dns_token: "{{ migration_dns_token }}"
    compose_migration_dns_records: "{{ migration_dns_records }}"
    compose_migration_accounts_env: "{{ migration_accounts_env }}"
    compose_migration_rag_env: "{{ migration_rag_env }}"
  when: migration_runtime == 'docker'

- name: Run systemd migration path
  ansible.builtin.include_role:
    name: openclaw_gateway_migration
  when: migration_runtime == 'systemd'

- name: Run k8s migration path
  ansible.builtin.include_role:
    name: k3s_core_migration
  when: migration_runtime in ['k3s', 'k8s']
