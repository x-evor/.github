---
- name: Render OpenClaw Caddy site
  ansible.builtin.copy:
    dest: "{{ openclaw_caddyfile_path }}"
    mode: "0644"
    content: |
      {
        acme_ca https://acme-v02.api.letsencrypt.org/directory
      }

      {{ openclaw_domain }} {
        @maps path *.map
        respond @maps 404

        header {
          -X-Forwarded-For
          -X-Forwarded-Proto
          -X-Forwarded-Host
          -X-Real-IP
        }

        reverse_proxy 127.0.0.1:{{ openclaw_service_port }} {
          header_up Authorization "Bearer {$OPENCLAW_GATEWAY_TOKEN}"
          header_up Host {http.request.host}
          header_up X-Forwarded-Proto {http.request.scheme}
          header_up X-Forwarded-Host {http.request.host}
          flush_interval -1
        }

        header {
          X-Content-Type-Options "nosniff"
          X-Frame-Options "DENY"
          Referrer-Policy "no-referrer"
          Permissions-Policy "camera=(), microphone=(), geolocation=()"
        }

        log {
          output file /var/log/caddy/openclaw.access.log {
            roll_size 50MiB
            roll_keep 10
            roll_keep_for 720h
          }
        }
      }

- name: Enable and restart caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: restarted
