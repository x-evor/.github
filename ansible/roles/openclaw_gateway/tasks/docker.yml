---
- name: Install Docker for gateway mode
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure docker compose directory exists
  ansible.builtin.file:
    path: "{{ openclaw_docker_compose_dir }}"
    state: directory
    mode: "0755"

- name: Render docker compose file
  ansible.builtin.copy:
    dest: "{{ openclaw_docker_compose_dir }}/docker-compose.yml"
    mode: "0644"
    content: |
      services:
        openclaw:
          image: "{{ openclaw_docker_image }}"
          restart: always
          ports:
            - "{{ openclaw_service_port }}:{{ openclaw_service_port }}"
          environment:
            OPENCLAW_GATEWAY_PORT: "{{ openclaw_service_port }}"
          volumes:
            - "{{ openclaw_workspace }}:{{ openclaw_workspace }}"
            - "{{ openclaw_runtime_dir }}:{{ openclaw_runtime_dir }}"
            - "{{ openclaw_root_config_dir }}:{{ openclaw_root_config_dir }}"

- name: Create docker systemd unit for OpenClaw
  ansible.builtin.copy:
    dest: /etc/systemd/system/openclaw-gateway-docker.service
    mode: "0644"
    content: |
      [Unit]
      Description=OpenClaw Gateway Docker Service
      After=docker.service network-online.target
      Wants=docker.service network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory={{ openclaw_docker_compose_dir }}
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down

      [Install]
      WantedBy=multi-user.target

- name: Reload systemd daemon for docker mode
  ansible.builtin.command: systemctl daemon-reload
  changed_when: false

- name: Enable and start docker gateway unit
  ansible.builtin.systemd:
    name: openclaw-gateway-docker
    enabled: true
    state: started
