---
- name: Validate openclaw gateway inputs
  ansible.builtin.assert:
    that:
      - openclaw_runtime_mode in ['systemd', 'docker']
      - openclaw_data_backend in ['local', 'gcs']
      - not (openclaw_runtime_mode == 'docker' and openclaw_docker_image | length == 0)
      - not (openclaw_manage_dns | bool and not ansible_check_mode and openclaw_cloudflare_api_token | length == 0)
      - not (openclaw_manage_dns | bool and openclaw_cloudflare_zone_name | length == 0 and openclaw_cloudflare_zone_id | length == 0)
    fail_msg: "Invalid openclaw_gateway configuration"

- name: Install common prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - fuse3
    state: present
    update_cache: true

- name: Include runtime package tasks
  ansible.builtin.include_tasks: packages.yml

- name: Include migration tasks
  ansible.builtin.include_tasks: migrate.yml
  when:
    - openclaw_manage_migration | bool
    - not ansible_check_mode

- name: Include service tasks
  ansible.builtin.include_tasks: service.yml

- name: Include docker service tasks
  ansible.builtin.include_tasks: docker.yml
  when: openclaw_runtime_mode == 'docker'

- name: Include caddy tasks
  ansible.builtin.include_tasks: caddy.yml
  when: openclaw_manage_caddy | bool

- name: Include dns tasks
  ansible.builtin.include_tasks: dns.yml
  when: openclaw_manage_dns | bool
