---
- name: Install migration prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - fuse3
    state: present
    update_cache: true

- name: Add NodeSource keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add NodeSource signing key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.gpg
    mode: "0644"

- name: Add NodeSource repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/nodesource.list
    mode: "0644"
    content: |
      deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_24.x nodistro main

- name: Install Node.js runtime
  ansible.builtin.apt:
    name:
      - nodejs
    state: present
    update_cache: true

- name: Install Caddy
  ansible.builtin.command: snap install caddy --classic
  register: caddy_snap_install
  changed_when: "'already installed' not in (caddy_snap_install.stderr | default('') ~ caddy_snap_install.stdout | default(''))"
  failed_when:
    - caddy_snap_install.rc != 0
    - "'already installed' not in (caddy_snap_install.stderr | default('') ~ caddy_snap_install.stdout | default(''))"

- name: Install gcsfuse repository keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add gcsfuse signing key
  ansible.builtin.get_url:
    url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
    dest: /etc/apt/keyrings/gcsfuse.gpg
    mode: "0644"

- name: Add gcsfuse repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/gcsfuse.list
    mode: "0644"
    content: |
      deb [signed-by=/etc/apt/keyrings/gcsfuse.gpg] https://packages.cloud.google.com/apt gcsfuse-{{ ansible_distribution_release | lower }} main
  register: gcsfuse_repo

- name: Update apt cache after gcsfuse repo add
  ansible.builtin.apt:
    update_cache: true
  when: gcsfuse_repo is changed

- name: Install gcsfuse
  ansible.builtin.apt:
    name:
      - gcsfuse
    state: present

- name: Ensure openclaw config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ openclaw_user_systemd_dir }}"
    - "{{ openclaw_root_config_dir }}"
    - "{{ openclaw_runtime_dir }}"
    - "{{ openclaw_workspace }}"

- name: Enable linger for root user
  ansible.builtin.command: loginctl enable-linger root
  changed_when: false

- name: Read source openclaw service unit
  ansible.builtin.slurp:
    src: /root/.config/systemd/user/openclaw-gateway.service
  delegate_to: "{{ openclaw_source_host }}"
  register: source_openclaw_unit
  changed_when: false
  no_log: true

- name: Read source openclaw env file
  ansible.builtin.slurp:
    src: /root/.env
  delegate_to: "{{ openclaw_source_host }}"
  register: source_root_env
  changed_when: false
  no_log: true

- name: Read source gcsfuse service
  ansible.builtin.slurp:
    src: /etc/systemd/system/openclawbot-data.mount.service
  delegate_to: "{{ openclaw_source_host }}"
  register: source_gcsfuse_unit
  changed_when: false
  no_log: true

- name: Read source service account json
  ansible.builtin.slurp:
    src: /root/.config/openclawbot/openclawbot-sa.json
  delegate_to: "{{ openclaw_source_host }}"
  register: source_sa_json
  changed_when: false
  no_log: true

- name: Read source openclaw runtime config
  ansible.builtin.slurp:
    src: /root/.openclaw/openclaw.json
  delegate_to: "{{ openclaw_source_host }}"
  register: source_openclaw_json
  changed_when: false
  no_log: true

- name: Write openclaw service account json
  ansible.builtin.copy:
    dest: "{{ openclaw_root_config_dir }}/openclawbot-sa.json"
    mode: "0600"
    content: "{{ source_sa_json.content | b64decode }}"
  no_log: true

- name: Write root environment file
  ansible.builtin.copy:
    dest: /root/.env
    mode: "0600"
    content: "{{ source_root_env.content | b64decode }}"
  no_log: true

- name: Write openclaw runtime config
  ansible.builtin.copy:
    dest: "{{ openclaw_runtime_dir }}/openclaw.json"
    mode: "0600"
    content: "{{ source_openclaw_json.content | b64decode }}"
  no_log: true

- name: Install openclaw npm package
  ansible.builtin.command: "npm install -g {{ openclaw_node_package }} --force"
  changed_when: true

- name: Install openclaw gcsfuse mount service
  ansible.builtin.copy:
    dest: /etc/systemd/system/openclawbot-data.mount.service
    mode: "0644"
    content: |
      [Unit]
      Description=Mount gs://{{ openclaw_bucket_name }} to {{ openclaw_workspace }} with gcsfuse
      Wants=network-online.target xray-client.service
      After=network-online.target xray-client.service

      [Service]
      Type=simple
      User=root
      Environment="HTTP_PROXY=socks5h://127.0.0.1:1080"
      Environment="HTTPS_PROXY=socks5h://127.0.0.1:1080"
      Environment="ALL_PROXY=socks5h://127.0.0.1:1080"
      Environment="NO_PROXY=localhost,127.0.0.1,::1"
      ExecStartPre=/bin/mkdir -p {{ openclaw_workspace }} /var/log/gcsfuse /var/cache/gcsfuse
      ExecStartPre=-/bin/sh -c 'mountpoint -q {{ openclaw_workspace }} && fusermount3 -u {{ openclaw_workspace }} || true'
      ExecStart=/usr/bin/gcsfuse --foreground --implicit-dirs --uid 1000 --gid 1000 --file-mode 0664 --dir-mode 0775 --key-file {{ openclaw_root_config_dir }}/openclawbot-sa.json --log-file /var/log/gcsfuse/{{ openclaw_bucket_name }}.log --o allow_other {{ openclaw_bucket_name }} {{ openclaw_workspace }}
      ExecStop=/bin/fusermount3 -u {{ openclaw_workspace }}
      Restart=on-failure
      RestartSec=5
      TimeoutStopSec=30

      [Install]
      WantedBy=multi-user.target

- name: Install openclaw gateway user unit
  ansible.builtin.copy:
    dest: "{{ openclaw_user_systemd_dir }}/openclaw-gateway.service"
    mode: "0644"
    content: |
      [Unit]
      Description=OpenClaw Gateway
      After=network-online.target openclawbot-data.mount.service
      Wants=network-online.target openclawbot-data.mount.service

      [Service]
      ExecStart=/usr/bin/node /usr/lib/node_modules/openclaw/dist/index.js gateway --port {{ openclaw_service_port }}
      Restart=always
      RestartSec=5
      KillMode=process
      Environment=HOME=/root
      Environment=TMPDIR=/tmp
      Environment=PATH=/root/.local/bin:/root/.npm-global/bin:/root/bin:/root/.volta/bin:/root/.asdf/shims:/root/.bun/bin:/root/.nvm/current/bin:/root/.fnm/current/bin:/root/.local/share/pnpm:/usr/local/bin:/usr/bin:/bin
      Environment=HTTP_PROXY=http://127.0.0.1:1081
      Environment=HTTPS_PROXY=http://127.0.0.1:1081
      Environment=OPENCLAW_GATEWAY_PORT={{ openclaw_service_port }}
      Environment=OPENCLAW_SYSTEMD_UNIT=openclaw-gateway.service
      Environment=OPENCLAW_SERVICE_MARKER=openclaw
      Environment=OPENCLAW_SERVICE_KIND=gateway
      Environment=OPENCLAW_SERVICE_VERSION=2026.3.24

      [Install]
      WantedBy=default.target

- name: Install OpenClaw Caddy site
  ansible.builtin.copy:
    dest: "{{ openclaw_caddyfile_path }}"
    mode: "0644"
    content: |
      {
        acme_ca https://acme-v02.api.letsencrypt.org/directory
      }

      {{ openclaw_domain }} {
        @maps path *.map
        respond @maps 404

        header {
          -X-Forwarded-For
          -X-Forwarded-Proto
          -X-Forwarded-Host
          -X-Real-IP
        }

        reverse_proxy 127.0.0.1:{{ openclaw_service_port }} {
          header_up Authorization "Bearer {$OPENCLAW_GATEWAY_TOKEN}"
          header_up Host {http.request.host}
          header_up X-Forwarded-Proto {http.request.scheme}
          header_up X-Forwarded-Host {http.request.host}
          flush_interval -1
        }

        header {
          X-Content-Type-Options "nosniff"
          X-Frame-Options "DENY"
          Referrer-Policy "no-referrer"
          Permissions-Policy "camera=(), microphone=(), geolocation=()"
        }

        log {
          output file /var/log/caddy/openclaw.access.log {
            roll_size 50MiB
            roll_keep 10
            roll_keep_for 720h
          }
        }
      }

- name: Reload systemd daemon
  ansible.builtin.command: systemctl daemon-reload
  changed_when: false

- name: Enable and start gcsfuse mount
  ansible.builtin.systemd:
    name: openclawbot-data.mount
    enabled: true
    state: started

- name: Enable and start openclaw gateway user service
  ansible.builtin.command: systemctl --user enable --now openclaw-gateway.service
  environment:
    XDG_RUNTIME_DIR: /run/user/0
  changed_when: true

- name: Enable and restart caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: restarted
