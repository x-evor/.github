- name: Validate shared compose deployment inputs
  ansible.builtin.import_tasks: validate.yml

- name: Prepare common docker runtime
  ansible.builtin.include_role:
    name: docker
  vars:
    docker_registry_server: "{{ service_compose_registry_server }}"
    docker_registry_username: "{{ service_compose_registry_username }}"
    docker_registry_password: "{{ service_compose_registry_password }}"

- name: Ensure service release root exists
  ansible.builtin.file:
    path: "{{ service_compose_project_root }}/{{ service_compose_service_slug }}"
    state: directory
    mode: "0755"

- name: Ensure shared stunnel component is ready
  ansible.builtin.import_tasks: shared_stunnel.yml
  when: service_compose_shared_stunnel_enabled | bool

- name: Deploy compose targets
  ansible.builtin.include_tasks: deploy_target.yml
  loop: "{{ service_compose_deploy_targets }}"
  loop_control:
    loop_var: deploy_target
    label: "{{ deploy_target.name | default(deploy_target.deploy_subdomain_prefix) }}"
