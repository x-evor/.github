- name: Check docker CLI is present on the target node
  ansible.builtin.command: docker --version
  register: shared_compose_docker_version
  changed_when: false

- name: Check docker compose plugin is present on the target node
  ansible.builtin.command: docker compose version
  register: shared_compose_docker_compose_version
  changed_when: false

- name: Validate required shared role inputs
  ansible.builtin.assert:
    that:
      - service_compose_service_slug | length > 0
      - service_compose_release_version | length > 0
      - service_compose_release_vhost_name | length > 0
      - service_compose_deploy_targets | length > 0
    fail_msg: "Set service_compose_service_slug, service_compose_release_version, service_compose_release_vhost_name, and at least one deploy target."

- name: Validate shared stunnel mode selection
  ansible.builtin.assert:
    that:
      - service_compose_shared_stunnel_mode in ['disabled', 'sidecar', 'external-client']
    fail_msg: "service_compose_shared_stunnel_mode must be disabled, sidecar, or external-client."

- name: Validate deploy target definitions
  ansible.builtin.assert:
    that:
      - deploy_target.deploy_subdomain_prefix | default('') | length > 0
      - deploy_target.host_port | default(0) | int > 0
      - (deploy_target.image | default(service_compose_image)) | length > 0
      - (deploy_target.image | default(service_compose_image)) != "REPLACE_IMAGE"
    fail_msg: "Each deploy target must define deploy_subdomain_prefix, host_port, and an image or service_compose_image."
  loop: "{{ service_compose_deploy_targets }}"
  loop_control:
    loop_var: deploy_target
    label: "{{ deploy_target.name | default(deploy_target.deploy_subdomain_prefix | default('missing-target')) }}"

- name: Validate shared stunnel inputs
  ansible.builtin.assert:
    that:
      - service_compose_shared_stunnel_network_name | length > 0
    fail_msg: "Shared stunnel network mode requires a valid network name."
  when: service_compose_shared_stunnel_attach_network | bool
