- name: Compute release metadata for {{ deploy_target.name | default(deploy_target.deploy_subdomain_prefix) }}
  ansible.builtin.set_fact:
    service_compose_release_service_name: "{{ deploy_target.release_dns_service_name | default(deploy_target.deploy_subdomain_prefix) }}"
    service_compose_release_name: "{{ (deploy_target.release_dns_service_name | default(deploy_target.deploy_subdomain_prefix)) ~ '-' ~ service_compose_release_version ~ '-' ~ service_compose_release_vhost_name }}"
    service_compose_release_dir: "{{ service_compose_project_root }}/{{ service_compose_service_slug }}/{{ (deploy_target.release_dns_service_name | default(deploy_target.deploy_subdomain_prefix)) ~ '-' ~ service_compose_release_version ~ '-' ~ service_compose_release_vhost_name }}"
    service_compose_release_fqdn: "{{ (deploy_target.release_dns_service_name | default(deploy_target.deploy_subdomain_prefix)) ~ '-' ~ service_compose_release_version ~ '-' ~ service_compose_release_vhost_name ~ '.' ~ service_compose_zone }}"
    service_compose_release_domains: "{{ ((deploy_target.stable_domains | default([])) + [((deploy_target.release_dns_service_name | default(deploy_target.deploy_subdomain_prefix)) ~ '-' ~ service_compose_release_version ~ '-' ~ service_compose_release_vhost_name ~ '.' ~ service_compose_zone)]) | unique }}"
    service_compose_release_image: "{{ deploy_target.image | default(service_compose_image) }}"
    service_compose_release_image_archive: "{{ deploy_target.image_archive | default(service_compose_image_archive) }}"
    service_compose_release_pull_images: "{{ (deploy_target.pull_images | default(service_compose_pull_images)) | bool }}"
    service_compose_requested_host_port: "{{ deploy_target.host_port | int }}"

- name: Compute release pull policy for {{ deploy_target.name | default(deploy_target.deploy_subdomain_prefix) }}
  ansible.builtin.set_fact:
    service_compose_release_pull_policy: >-
      {{
        deploy_target.pull_policy
        | default(
            service_compose_pull_policy
            if (
              service_compose_release_pull_images
              or service_compose_release_image_archive | length == 0
            )
            else 'never'
          )
      }}

- name: Resolve available host port for {{ service_compose_release_name }}
  ansible.builtin.shell: |
    set -euo pipefail
    requested_port="{{ service_compose_requested_host_port }}"
    max_attempts="{{ service_compose_host_port_autoincrement_max_attempts | int }}"
    candidate_port="$requested_port"
    attempt=0

    is_port_free() {
      local port="$1"
      if command -v ss >/dev/null 2>&1; then
        ! ss -ltnH "( sport = :${port} )" | grep -q .
        return
      fi
      if command -v lsof >/dev/null 2>&1; then
        ! lsof -nP -iTCP:"${port}" -sTCP:LISTEN >/dev/null 2>&1
        return
      fi
      python3 - "${port}" <<'PY'
import socket
import sys

port = int(sys.argv[1])
sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
try:
    sock.bind(("127.0.0.1", port))
except OSError:
    sys.exit(1)
finally:
    sock.close()
PY
    }

    while [ "$attempt" -lt "$max_attempts" ]; do
      if is_port_free "$candidate_port"; then
        printf '%s' "$candidate_port"
        exit 0
      fi
      candidate_port=$((candidate_port + 1))
      attempt=$((attempt + 1))
    done

    echo "Unable to find a free host port starting from ${requested_port} after ${max_attempts} attempts." >&2
    exit 1
  args:
    executable: /bin/bash
  register: service_compose_resolved_host_port_result
  changed_when: false

- name: Persist resolved host port for {{ service_compose_release_name }}
  ansible.builtin.set_fact:
    service_compose_resolved_host_port: "{{ service_compose_resolved_host_port_result.stdout | trim | int }}"

- name: Ensure release directories exist for {{ service_compose_release_name }}
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ service_compose_release_dir }}"
    - "{{ service_compose_release_dir }}/env"

- name: Check local image archive for {{ service_compose_release_name }}
  ansible.builtin.stat:
    path: "{{ service_compose_release_image_archive }}"
  delegate_to: localhost
  become: false
  register: service_compose_release_image_archive_stat
  when: service_compose_release_image_archive | length > 0

- name: Validate local image archive for {{ service_compose_release_name }}
  ansible.builtin.assert:
    that:
      - service_compose_release_image_archive_stat.stat.exists
      - service_compose_release_image_archive_stat.stat.isreg
    fail_msg: "Local image archive does not exist: {{ service_compose_release_image_archive }}"
  when: service_compose_release_image_archive | length > 0

- name: Copy local image archive for {{ service_compose_release_name }}
  ansible.builtin.copy:
    src: "{{ service_compose_release_image_archive }}"
    dest: "{{ service_compose_release_dir }}/image.tar"
    mode: "0644"
  when:
    - service_compose_release_image_archive | length > 0
    - not ansible_check_mode

- name: Load image archive for {{ service_compose_release_name }}
  ansible.builtin.shell: |
    set -euo pipefail
    docker load -i "{{ service_compose_release_dir }}/image.tar"
  args:
    executable: /bin/bash
  changed_when: true
  when:
    - service_compose_release_image_archive | length > 0
    - not ansible_check_mode

- name: Remove transferred image archive for {{ service_compose_release_name }}
  ansible.builtin.file:
    path: "{{ service_compose_release_dir }}/image.tar"
    state: absent
  when:
    - service_compose_release_image_archive | length > 0
    - not ansible_check_mode

- name: Render docker compose manifest for {{ service_compose_release_name }}
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ service_compose_release_dir }}/docker-compose.yml"
    mode: "0644"

- name: Render env file for {{ service_compose_release_name }}
  ansible.builtin.template:
    src: app.env.j2
    dest: "{{ service_compose_release_dir }}/env/app.env"
    mode: "0600"
  no_log: true

- name: Discover legacy release directories for {{ deploy_target.deploy_subdomain_prefix }}
  ansible.builtin.find:
    paths: "{{ service_compose_project_root }}/{{ service_compose_service_slug }}"
    patterns: "{{ service_compose_release_service_name }}-*"
    file_type: directory
    recurse: false
  register: service_compose_existing_release_dirs

- name: Stop superseded releases for {{ deploy_target.deploy_subdomain_prefix }}
  ansible.builtin.shell: |
    set -euo pipefail
    if [ -f "{{ item.path }}/docker-compose.yml" ]; then
      docker compose -f "{{ item.path }}/docker-compose.yml" down --remove-orphans || true
    fi
  args:
    executable: /bin/bash
  loop: "{{ service_compose_existing_release_dirs.files }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - service_compose_remove_previous_releases | bool
    - item.path != service_compose_release_dir
    - not ansible_check_mode
  changed_when: true

- name: Start release {{ service_compose_release_name }}
  ansible.builtin.shell: |
    set -euo pipefail
    {% if service_compose_release_pull_images | bool %}
    docker compose -f "{{ service_compose_release_dir }}/docker-compose.yml" pull
    {% endif %}
    docker compose -f "{{ service_compose_release_dir }}/docker-compose.yml" up -d --remove-orphans
  args:
    executable: /bin/bash
  changed_when: true
  when: not ansible_check_mode

- name: Wait for loopback health endpoint on {{ service_compose_release_name }}
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ service_compose_resolved_host_port }}{{ deploy_target.healthcheck_path | default(service_compose_healthcheck_path) }}"
    method: GET
    status_code: [200, 204]
  register: service_compose_health_result
  retries: "{{ deploy_target.health_retries | default(20) }}"
  delay: "{{ deploy_target.health_delay_seconds | default(3) }}"
  until: service_compose_health_result.status in [200, 204]
  when: not ansible_check_mode

- name: Discover legacy Caddy site files for {{ deploy_target.deploy_subdomain_prefix }}
  ansible.builtin.find:
    paths: "{{ service_compose_caddy_conf_dir }}"
    patterns: "{{ service_compose_release_service_name }}-*.caddy"
    file_type: file
  register: service_compose_existing_caddy_files

- name: Remove superseded Caddy site files for {{ deploy_target.deploy_subdomain_prefix }}
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ service_compose_existing_caddy_files.files }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - service_compose_remove_previous_caddy | bool
    - item.path != service_compose_caddy_conf_dir ~ '/' ~ service_compose_release_name ~ '.caddy'

- name: Render Caddy site file for {{ service_compose_release_name }}
  ansible.builtin.template:
    src: site.caddy.j2
    dest: "{{ service_compose_caddy_conf_dir }}/{{ service_compose_release_name }}.caddy"
    mode: "0644"

- name: Validate Caddy configuration after updating {{ service_compose_release_name }}
  ansible.builtin.command: caddy validate --config /etc/caddy/Caddyfile
  changed_when: false
  when: not ansible_check_mode

- name: Reload Caddy after updating {{ service_compose_release_name }}
  ansible.builtin.shell: "{{ service_compose_caddy_reload_command }}"
  args:
    executable: /bin/bash
  changed_when: true
  when: not ansible_check_mode

- name: Remove superseded release directories for {{ deploy_target.deploy_subdomain_prefix }}
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ service_compose_existing_release_dirs.files }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - service_compose_remove_previous_releases | bool
    - item.path != service_compose_release_dir
