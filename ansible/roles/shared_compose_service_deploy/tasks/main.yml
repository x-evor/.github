- name: Validate shared compose deployment inputs
  ansible.builtin.import_tasks: validate.yml

- name: Log in to remote image registry when credentials are configured
  ansible.builtin.shell: |
    set -euo pipefail
    printf '%s' '{{ service_compose_registry_password }}' | docker login {{ service_compose_registry_server }} \
      --username '{{ service_compose_registry_username }}' \
      --password-stdin
  args:
    executable: /bin/bash
  when:
    - service_compose_registry_server | length > 0
    - service_compose_registry_username | length > 0
    - service_compose_registry_password | length > 0
    - not ansible_check_mode
  changed_when: true
  no_log: true

- name: Ensure service release root exists
  ansible.builtin.file:
    path: "{{ service_compose_project_root }}/{{ service_compose_service_slug }}"
    state: directory
    mode: "0755"

- name: Remove legacy shared stunnel sidecar when it is no longer managed
  ansible.builtin.import_tasks: shared_stunnel_cleanup.yml
  when: service_compose_shared_stunnel_mode != 'sidecar'

- name: Ensure shared stunnel component is ready
  ansible.builtin.import_tasks: shared_stunnel.yml
  when: service_compose_shared_stunnel_enabled | bool

- name: Deploy compose targets
  ansible.builtin.include_tasks: deploy_target.yml
  loop: "{{ service_compose_deploy_targets }}"
  loop_control:
    loop_var: deploy_target
    label: "{{ deploy_target.name | default(deploy_target.deploy_subdomain_prefix) }}"
