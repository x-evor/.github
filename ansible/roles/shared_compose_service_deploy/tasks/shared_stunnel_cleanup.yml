- name: Stop and remove legacy shared stunnel sidecar container
  ansible.builtin.shell: |
    set -euo pipefail
    docker rm -f "{{ service_compose_shared_stunnel_container_name }}" >/dev/null 2>&1 || true
  args:
    executable: /bin/bash
  changed_when: true
  when: not ansible_check_mode

- name: Remove legacy shared stunnel compose directory
  ansible.builtin.file:
    path: "{{ service_compose_shared_stunnel_runtime_dir }}"
    state: absent
  when: not ansible_check_mode

- name: Stop and remove legacy global shared stunnel sidecar container
  ansible.builtin.shell: |
    set -euo pipefail
    docker rm -f "cn-toolkit-stunnel-client" >/dev/null 2>&1 || true
  args:
    executable: /bin/bash
  changed_when: true
  when: not ansible_check_mode

- name: Remove legacy global shared stunnel compose directory
  ansible.builtin.file:
    path: "{{ service_compose_project_root }}/shared-components/stunnel-client"
    state: absent
  when: not ansible_check_mode
