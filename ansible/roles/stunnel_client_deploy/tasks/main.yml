---
- name: Check docker CLI is present on the target node
  ansible.builtin.command: docker --version
  changed_when: false

- name: Check docker compose plugin is present on the target node
  ansible.builtin.command: docker compose version
  changed_when: false

- name: Validate stunnel-client deploy inputs
  ansible.builtin.assert:
    that:
      - stunnel_client_image | length > 0
      - stunnel_client_remote_host | length > 0
      - stunnel_client_remote_port | length > 0
    fail_msg: "stunnel-client deploy requires image_ref and remote host/port inputs."

- name: Ensure stunnel-client release directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ stunnel_client_release_root }}"
    - "{{ stunnel_client_conf_dir }}"

- name: Render stunnel-client config
  ansible.builtin.template:
    src: stunnel-client.conf.j2
    dest: "{{ stunnel_client_conf_dir }}/stunnel.conf"
    mode: "0644"

- name: Render stunnel-client docker compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ stunnel_client_compose_file }}"
    mode: "0644"

- name: Pull and start stunnel-client release
  ansible.builtin.shell: |
    set -euo pipefail
    docker compose -f "{{ stunnel_client_compose_file }}" pull
    docker compose -f "{{ stunnel_client_compose_file }}" up -d --remove-orphans
  args:
    executable: /bin/bash
  changed_when: true
  when: not ansible_check_mode

- name: Wait for stunnel-client host port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ stunnel_client_accept_port }}"
    timeout: 60
  when: not ansible_check_mode

