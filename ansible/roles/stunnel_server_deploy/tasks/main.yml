---
- name: Check docker CLI is present on the target node
  ansible.builtin.command: docker --version
  changed_when: false

- name: Check docker compose plugin is present on the target node
  ansible.builtin.command: docker compose version
  changed_when: false

- name: Validate stunnel-server deploy inputs
  ansible.builtin.assert:
    that:
      - stunnel_server_image | length > 0
      - stunnel_server_cert_domain | length > 0
    fail_msg: "stunnel-server deploy requires image_ref and a certificate domain."

- name: Ensure stunnel-server release directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ stunnel_server_release_root }}"
    - "{{ stunnel_server_conf_dir }}"
    - "{{ stunnel_server_certs_dir }}"

- name: Check whether Caddy certificate already exists
  ansible.builtin.stat:
    path: "{{ stunnel_server_caddy_cert_dir }}/{{ stunnel_server_cert_domain }}.crt"
  register: stunnel_server_caddy_cert_stat

- name: Check whether Caddy private key already exists
  ansible.builtin.stat:
    path: "{{ stunnel_server_caddy_cert_dir }}/{{ stunnel_server_cert_domain }}.key"
  register: stunnel_server_caddy_key_stat

- name: Copy certificate from Caddy storage
  ansible.builtin.copy:
    src: "{{ stunnel_server_caddy_cert_dir }}/{{ stunnel_server_cert_domain }}.crt"
    dest: "{{ stunnel_server_cert_file }}"
    remote_src: true
    mode: "0644"
  when:
    - stunnel_server_caddy_cert_stat.stat.exists
    - stunnel_server_caddy_key_stat.stat.exists

- name: Copy private key from Caddy storage
  ansible.builtin.copy:
    src: "{{ stunnel_server_caddy_cert_dir }}/{{ stunnel_server_cert_domain }}.key"
    dest: "{{ stunnel_server_key_file }}"
    remote_src: true
    mode: "0600"
  when:
    - stunnel_server_caddy_cert_stat.stat.exists
    - stunnel_server_caddy_key_stat.stat.exists

- name: Fail when Caddy certificate is unavailable
  ansible.builtin.assert:
    that:
      - stunnel_server_caddy_cert_stat.stat.exists
      - stunnel_server_caddy_key_stat.stat.exists
    fail_msg: >-
      Missing Caddy-managed certificate for {{ stunnel_server_cert_domain }} under
      {{ stunnel_server_caddy_cert_dir }}. Run the postgresql stable domain release first so
      Caddy can issue the real certificate, then re-run stunnel-server deployment.

- name: Render stunnel-server config
  ansible.builtin.template:
    src: stunnel-server.conf.j2
    dest: "{{ stunnel_server_conf_dir }}/stunnel.conf"
    mode: "0644"

- name: Render stunnel-server docker compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ stunnel_server_compose_file }}"
    mode: "0644"

- name: Pull and start stunnel-server release
  ansible.builtin.shell: |
    set -euo pipefail
    docker compose -f "{{ stunnel_server_compose_file }}" pull
    docker compose -f "{{ stunnel_server_compose_file }}" up -d --remove-orphans
  args:
    executable: /bin/bash
  changed_when: true
  when: not ansible_check_mode

- name: Wait for stunnel-server host port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ stunnel_server_host_port }}"
    timeout: 60
  when: not ansible_check_mode
