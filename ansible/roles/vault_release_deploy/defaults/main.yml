vault_release_root: /opt/cloud-neutral/vault
vault_release_http_port: 18200
vault_release_container_name: cn-toolkit-vault
vault_release_caddy_conf_dir: /etc/caddy/conf.d
vault_release_data_dir: "{{ vault_release_root }}/data"
vault_release_config_dir: "{{ vault_release_root }}/config"
vault_release_compose_file: "{{ vault_release_root }}/docker-compose.yml"
vault_release_image: "{{ service_image_ref }}"
vault_release_primary_domain: "{{ service_public_domain | default(service_release_domain, true) }}"
vault_release_domains: "{{ service_release_domains | default([service_public_domain, service_release_domain]) | reject('equalto', '') | list }}"
