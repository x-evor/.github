---
- name: Check docker CLI is present on the target node
  ansible.builtin.command: docker --version
  changed_when: false

- name: Check docker compose plugin is present on the target node
  ansible.builtin.command: docker compose version
  changed_when: false

- name: Validate Vault deploy inputs
  ansible.builtin.assert:
    that:
      - vault_release_image | length > 0
      - vault_release_primary_domain | length > 0
      - vault_release_domains | length > 0
    fail_msg: "Vault deploy requires service image ref plus public or release domains."

- name: Ensure Vault release directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ vault_release_root }}"
    - "{{ vault_release_data_dir }}"
    - "{{ vault_release_config_dir }}"

- name: Render Vault config
  ansible.builtin.template:
    src: vault.hcl.j2
    dest: "{{ vault_release_config_dir }}/vault.hcl"
    mode: "0644"

- name: Render Vault docker compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ vault_release_compose_file }}"
    mode: "0644"

- name: Discover legacy Vault Caddy files
  ansible.builtin.find:
    paths: "{{ vault_release_caddy_conf_dir }}"
    patterns: "vault-*.caddy"
    file_type: file
  register: vault_release_existing_caddy_files

- name: Render Vault Caddy site file
  ansible.builtin.template:
    src: site.caddy.j2
    dest: "{{ vault_release_caddy_conf_dir }}/vault-{{ service_release_version_dns_label | default(service_release_version | default('manual')) }}.caddy"
    mode: "0644"

- name: Remove superseded Vault Caddy site files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ vault_release_existing_caddy_files.files }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - item.path != vault_release_caddy_conf_dir ~ '/vault-' ~ (service_release_version_dns_label | default(service_release_version | default('manual'))) ~ '.caddy'

- name: Validate Caddy configuration for Vault
  ansible.builtin.command: caddy validate --config /etc/caddy/Caddyfile
  changed_when: false
  when: not ansible_check_mode

- name: Pull and start Vault release
  ansible.builtin.shell: |
    set -euo pipefail
    docker compose -f "{{ vault_release_compose_file }}" pull
    docker compose -f "{{ vault_release_compose_file }}" up -d --remove-orphans
  args:
    executable: /bin/bash
  changed_when: true
  when: not ansible_check_mode

- name: Wait for Vault loopback port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ vault_release_http_port }}"
    timeout: 60
  when: not ansible_check_mode

- name: Reload Caddy after Vault update
  ansible.builtin.command: systemctl reload caddy
  changed_when: true
  when: not ansible_check_mode
