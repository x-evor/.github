release_name: xworkmate-parity-vnext
workspace_repo: xworkmate.svc.plus
skills_dispatch:
  orchestrator_skill_path: ~/.codex/skills/architect-orchestrator/
constraints:
  - Keep macOS and iOS behavior unchanged unless a shared abstraction change is required and revalidated.
  - Use a dedicated git worktree per parity lane on the assigned host.
  - Push fixes only to the assigned codex/* parity branch for that lane.
  - For Android parity on the Windows host, successful `flutter build apk` packaging is the required host-side evidence.
  - Android emulator and adb runtime validation are handled on the local macOS workstation, not on the Azure Windows host.
hosts:
  windows:
    provider: azure
    profile_name: azure-win11-desktop
    request_file: ansible/vars/cloud_dev_desktop.azure.windows-desktop.example.yml
  fedora_gnome:
    provider: gcp
    profile_name: gcp-fedora-gnome-desktop
    request_file: ansible/vars/cloud_dev_desktop.gcp.fedora-gnome.example.yml
  ubuntu_kde:
    provider: gcp
    profile_name: gcp-ubuntu-kde-desktop
    request_file: ansible/vars/cloud_dev_desktop.gcp.ubuntu-kde.example.yml
tasks:
  - name: windows-desktop-parity
    branch: codex/windows-parity
    host: windows
    worktree_name: xworkmate.svc.plus-windows-parity
    validation_focus: Build, run, and repair the Flutter Windows desktop target.
  - name: android-mobile-parity
    branch: codex/android-mobile-parity
    host: windows
    worktree_name: xworkmate.svc.plus-android-mobile-parity
    validation_focus: Build and repair Android APK packaging from the Windows host; local macOS owns emulator and adb runtime validation for this lane.
  - name: linux-gnome-desktop-parity
    branch: codex/linux-gnome-desktop-parity
    host: fedora_gnome
    worktree_name: xworkmate.svc.plus-linux-gnome-desktop-parity
    validation_focus: Build, run, and repair the GNOME desktop target on Fedora.
  - name: linux-kde-desktop-parity
    branch: codex/linux-kde-desktop-parity
    host: ubuntu_kde
    worktree_name: xworkmate.svc.plus-linux-kde-desktop-parity
    validation_focus: Build, run, and repair the KDE desktop target on Ubuntu.
post_actions:
  park_hosts: true
