service_compose_service_slug: console
service_compose_zone: svc.plus
service_compose_container_port: 3000
service_compose_env_common:
  NODE_ENV: production
  PORT: "3000"
  RUNTIME_ENV: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_RUNTIME_ENVIRONMENT') | default('prod', true) }}"
  REGION: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_RUNTIME_REGION') | default('cn', true) }}"
  APP_BASE_URL: "{{ lookup('ansible.builtin.env', 'APP_BASE_URL') | default('https://' ~ service_public_domain, true) }}"
  NEXT_PUBLIC_APP_BASE_URL: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_APP_BASE_URL') | default('https://' ~ service_public_domain, true) }}"
  NEXT_PUBLIC_SITE_URL: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_SITE_URL') | default('https://' ~ service_public_domain, true) }}"
  NEXT_PUBLIC_LOGIN_URL: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_LOGIN_URL') | default('https://' ~ service_public_domain ~ '/login', true) }}"
  NEXT_PUBLIC_DOCS_BASE_URL: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_DOCS_BASE_URL') | default('https://docs.svc.plus', true) }}"
  SESSION_COOKIE_SECURE: "true"
  NEXT_PUBLIC_SESSION_COOKIE_SECURE: "true"
  RUNTIME_HOSTNAME: "{{ lookup('ansible.builtin.env', 'RUNTIME_HOSTNAME') | default(service_public_domain, true) }}"
  NEXT_RUNTIME_HOSTNAME: "{{ lookup('ansible.builtin.env', 'NEXT_RUNTIME_HOSTNAME') | default(service_public_domain, true) }}"
  DEPLOYMENT_HOSTNAME: "{{ lookup('ansible.builtin.env', 'DEPLOYMENT_HOSTNAME') | default(service_public_domain, true) }}"
  NEXT_PUBLIC_RUNTIME_ENVIRONMENT: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_RUNTIME_ENVIRONMENT') | default('prod', true) }}"
  NEXT_PUBLIC_RUNTIME_REGION: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_RUNTIME_REGION') | default('cn', true) }}"
  ACCOUNT_SERVICE_URL: "{{ lookup('ansible.builtin.env', 'ACCOUNT_SERVICE_URL') | default('https://accounts.svc.plus', true) }}"
  NEXT_PUBLIC_ACCOUNT_SERVICE_URL: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_ACCOUNT_SERVICE_URL') | default(lookup('ansible.builtin.env', 'ACCOUNT_SERVICE_URL') | default('https://accounts.svc.plus', true), true) }}"
  SERVER_SERVICE_URL: "{{ lookup('ansible.builtin.env', 'SERVER_SERVICE_URL') | default('https://api.svc.plus', true) }}"
  NEXT_PUBLIC_SERVER_SERVICE_URL: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_SERVER_SERVICE_URL') | default(lookup('ansible.builtin.env', 'SERVER_SERVICE_URL') | default('https://api.svc.plus', true), true) }}"
  SERVER_SERVICE_INTERNAL_URL: "{{ lookup('ansible.builtin.env', 'SERVER_SERVICE_INTERNAL_URL') | default('', true) }}"
  DOCS_SERVICE_URL: "{{ lookup('ansible.builtin.env', 'DOCS_SERVICE_URL') | default('https://docs.svc.plus', true) }}"
  DOCS_SERVICE_INTERNAL_URL: "{{ lookup('ansible.builtin.env', 'DOCS_SERVICE_INTERNAL_URL') | default('', true) }}"
  OPENCLAW_GATEWAY_REMOTE_URL: "{{ lookup('ansible.builtin.env', 'OPENCLAW_GATEWAY_REMOTE_URL') | default('', true) }}"
  OPENCLAW_GATEWAY_TOKEN: "{{ lookup('ansible.builtin.env', 'OPENCLAW_GATEWAY_TOKEN') | default('', true) }}"
  VAULT_SERVER_URL: "{{ lookup('ansible.builtin.env', 'VAULT_SERVER_URL') | default('', true) }}"
  VAULT_NAMESPACE: "{{ lookup('ansible.builtin.env', 'VAULT_NAMESPACE') | default('', true) }}"
  VAULT_TOKEN: "{{ lookup('ansible.builtin.env', 'VAULT_TOKEN') | default('', true) }}"
  APISIX_AI_GATEWAY_URL: "{{ lookup('ansible.builtin.env', 'APISIX_AI_GATEWAY_URL') | default('', true) }}"
  AI_GATEWAY_ACCESS_TOKEN: "{{ lookup('ansible.builtin.env', 'AI_GATEWAY_ACCESS_TOKEN') | default('', true) }}"
  INTERNAL_SERVICE_TOKEN: "{{ lookup('ansible.builtin.env', 'INTERNAL_SERVICE_TOKEN') | default('', true) }}"
  CLOUDFLARE_API_TOKEN: "{{ lookup('ansible.builtin.env', 'CLOUDFLARE_API_TOKEN') | default('', true) }}"
  CLOUDFLARE_ACCOUNT_ID: "{{ lookup('ansible.builtin.env', 'CLOUDFLARE_ACCOUNT_ID') | default('', true) }}"
  CLOUDFLARE_WEB_ANALYTICS_SITE_TAG: "{{ lookup('ansible.builtin.env', 'CLOUDFLARE_WEB_ANALYTICS_SITE_TAG') | default('', true) }}"
  CLOUDFLARE_ZONE_TAG: "{{ lookup('ansible.builtin.env', 'CLOUDFLARE_ZONE_TAG') | default('', true) }}"
  ROOT_EMAIL_WHITELIST: "{{ lookup('ansible.builtin.env', 'ROOT_EMAIL_WHITELIST') | default('admin@svc.plus', true) }}"
  NEXT_PUBLIC_PAYPAL_CLIENT_ID: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_PAYPAL_CLIENT_ID') | default('', true) }}"
  NEXT_PUBLIC_GISCUS_REPO: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_GISCUS_REPO') | default('cloud-neutral-toolkit/console.svc.plus', true) }}"
  NEXT_PUBLIC_GISCUS_REPO_ID: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_GISCUS_REPO_ID') | default('', true) }}"
  NEXT_PUBLIC_GISCUS_CATEGORY: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_GISCUS_CATEGORY') | default('General', true) }}"
  NEXT_PUBLIC_GISCUS_CATEGORY_ID: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_GISCUS_CATEGORY_ID') | default('', true) }}"
  NEXT_PUBLIC_STRIPE_PRICE_XSTREAM_PAYGO: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_STRIPE_PRICE_XSTREAM_PAYGO') | default('', true) }}"
  NEXT_PUBLIC_STRIPE_PRICE_XSTREAM_SUBSCRIPTION: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_STRIPE_PRICE_XSTREAM_SUBSCRIPTION') | default('', true) }}"
  NEXT_PUBLIC_STRIPE_PRICE_XSCOPEHUB_PAYGO: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_STRIPE_PRICE_XSCOPEHUB_PAYGO') | default('', true) }}"
  NEXT_PUBLIC_STRIPE_PRICE_XSCOPEHUB_SUBSCRIPTION: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_STRIPE_PRICE_XSCOPEHUB_SUBSCRIPTION') | default('', true) }}"
  NEXT_PUBLIC_STRIPE_PRICE_XCLOUDFLOW_PAYGO: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_STRIPE_PRICE_XCLOUDFLOW_PAYGO') | default('', true) }}"
  NEXT_PUBLIC_STRIPE_PRICE_XCLOUDFLOW_SUBSCRIPTION: "{{ lookup('ansible.builtin.env', 'NEXT_PUBLIC_STRIPE_PRICE_XCLOUDFLOW_SUBSCRIPTION') | default('', true) }}"
