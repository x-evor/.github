apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "x-evor.fullname" . }}-caddyfile
  labels:
    {{- include "x-evor.labels" . | nindent 4 }}
data:
  Caddyfile: |
    {
      admin off
    }

    {{ .Values.global.domain }} {
      encode zstd gzip
      @grpc path /split/*
      handle @grpc {
        reverse_proxy {{ include "x-evor.fullname" . }}-xray:8080
      }
      respond "Agent Service Plus Node"
    }

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "x-evor.fullname" . }}-caddy-sites
  labels:
    {{- include "x-evor.labels" . | nindent 4 }}
data:
  accounts.caddy: |
    {{ .Values.global.accountsDomain }}, {{ .Values.global.secondaryAccountsDomain }} {
      encode zstd gzip
      reverse_proxy {{ include "x-evor.fullname" . }}-apisix:9080
    }
  api.caddy: |
    {{ .Values.global.apiDomain }} {
      encode zstd gzip
      header {
        X-Content-Type-Options "nosniff"
        X-Frame-Options "DENY"
        Referrer-Policy "no-referrer"
      }
      reverse_proxy {{ include "x-evor.fullname" . }}-apisix:9080
    }
  console.caddy: |
    {{ .Values.global.consoleDomain }}, {{ .Values.global.secondaryConsoleDomain }} {
      encode zstd gzip
      reverse_proxy {{ include "x-evor.fullname" . }}-console:3000
    }
  vault.caddy: |
    {{ .Values.global.vaultDomain }} {
      encode zstd gzip
      header {
        X-Content-Type-Options "nosniff"
        X-Frame-Options "DENY"
        Referrer-Policy "no-referrer"
      }
      reverse_proxy {{ include "x-evor.fullname" . }}-vault:8200
    }
  openclaw.caddy: |
    {{ .Values.global.openclawDomain }} {
      encode zstd gzip
      reverse_proxy {{ include "x-evor.fullname" . }}-openclaw:18789
    }
  docs.caddy: |
    docs.svc.plus {
      encode zstd gzip
      reverse_proxy 127.0.0.1:18083
    }
  observability.caddy: |
    observability.svc.plus {
      encode zstd gzip
      handle_path /grafana/* { reverse_proxy 127.0.0.1:18091 }
      handle_path /vmetrics/* { reverse_proxy 127.0.0.1:18092 }
      handle_path /vlogs/* { reverse_proxy 127.0.0.1:18093 }
      handle_path /vtraces/* { reverse_proxy 127.0.0.1:18094 }
      handle_path /vmalert/* { reverse_proxy 127.0.0.1:18095 }
      handle_path /alertmgr/* { reverse_proxy 127.0.0.1:18096 }
      handle_path /blackbox/* { reverse_proxy 127.0.0.1:18097 }
      handle_path /code/* { reverse_proxy 127.0.0.1:18098 }
      handle_path /jupyter/* { reverse_proxy 127.0.0.1:18099 }
      handle_path /haproxy/pg-meta-1/* { reverse_proxy 127.0.0.1:18100 }
      handle_path /nginx { reverse_proxy 127.0.0.1:18101 }
      handle_path /www { reverse_proxy 127.0.0.1:18102 }
      handle_path /zh { reverse_proxy 127.0.0.1:18103 }
      handle_path /pev { reverse_proxy 127.0.0.1:18104 }
    }
  postgresql.caddy: |
    postgresql-17-contabo.svc.plus {
      encode zstd gzip
      respond "postgresql tls tunnel endpoint" 200
    }
  x-cloud-flow.caddy: |
    x-cloud-flow-contabo-458f542.caddy {
      encode zstd gzip
      reverse_proxy 127.0.0.1:18087
    }
  x-ops-agent.caddy: |
    x-ops-agent-contabo-7499c4b.caddy {
      encode zstd gzip
      reverse_proxy 127.0.0.1:18086
    }
  x-scope-hub.caddy: |
    x-scope-hub-contabo-9a1a482.caddy {
      encode zstd gzip
      reverse_proxy 127.0.0.1:18085
    }
---
{{- if .Values.stunnelServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "x-evor.fullname" . }}-caddy
spec:
  replicas: {{ .Values.resources.caddy.replicas }}
  selector:
    matchLabels:
      app: {{ include "x-evor.fullname" . }}-caddy
  template:
    metadata:
      labels:
        app: {{ include "x-evor.fullname" . }}-caddy
        {{- include "x-evor.labels" . | nindent 8 }}
    spec:
      containers:
        - name: caddy
          image: {{ .Values.images.caddy }}
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            - name: caddy-sites
              mountPath: /etc/caddy/conf.d
            - name: xray-socket
              mountPath: /dev/shm
      volumes:
        - name: caddyfile
          configMap:
            name: {{ include "x-evor.fullname" . }}-caddyfile
        - name: caddy-sites
          configMap:
            name: {{ include "x-evor.fullname" . }}-caddy-sites
        - name: xray-socket
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "x-evor.fullname" . }}-caddy
spec:
  selector:
    app: {{ include "x-evor.fullname" . }}-caddy
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "x-evor.fullname" . }}-apisix-config
data:
  config.yaml: |
    deployment:
      role: data_plane
      role_data_plane:
        config_provider: yaml
    apisix:
      node_listen: 9080
      enable_admin: true
      admin_listen:
        port: 9180
      allow_admin:
        - 0.0.0.0/0
    nginx_config:
      error_log_level: warn
  apisix.yaml: |
    routes:
      - id: 1
        uri: "/*"
        hosts: [{{ .Values.global.accountsDomain | quote }}]
        name: stable-accounts
        upstream:
          type: roundrobin
          nodes:
            "{{ include "x-evor.fullname" . }}-account:8080": 1
      - id: 2
        uri: "/*"
        hosts: [{{ .Values.global.secondaryAccountsDomain | quote }}]
        name: preview-accounts
        upstream:
          type: roundrobin
          nodes:
            "{{ include "x-evor.fullname" . }}-account:8080": 1
      - id: 3
        uri: "/*"
        hosts: [{{ .Values.global.ragDomain | quote }}]
        name: stable-rag-server
        upstream:
          type: roundrobin
          nodes:
            "{{ include "x-evor.fullname" . }}-rag-server:8080": 1
      - id: 4
        uri: "/*"
        hosts: [{{ .Values.global.apiDomain | quote }}]
        name: api-gateway
        upstream:
          type: roundrobin
          nodes:
            "{{ include "x-evor.fullname" . }}-account:8080": 1
      #END
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "x-evor.fullname" . }}-apisix
spec:
  replicas: {{ .Values.resources.apisix.replicas }}
  selector:
    matchLabels:
      app: {{ include "x-evor.fullname" . }}-apisix
  template:
    metadata:
      labels:
        app: {{ include "x-evor.fullname" . }}-apisix
    spec:
      containers:
        - name: apisix
          image: {{ .Values.images.apisix }}
          env:
            - name: APISIX_STAND_ALONE
              value: "true"
          ports:
            - containerPort: 9080
            - containerPort: 9180
          command:
            - /bin/sh
            - -lc
            - |
              cp /opt/apisix-bootstrap/config.yaml /usr/local/apisix/conf/config.yaml &&
              cp /opt/apisix-bootstrap/apisix.yaml /usr/local/apisix/conf/apisix.yaml &&
              exec /docker-entrypoint.sh docker-start
          volumeMounts:
            - name: apisix-config
              mountPath: /opt/apisix-bootstrap
      volumes:
        - name: apisix-config
          configMap:
            name: {{ include "x-evor.fullname" . }}-apisix-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "x-evor.fullname" . }}-apisix
spec:
  selector:
    app: {{ include "x-evor.fullname" . }}-apisix
  ports:
    - name: http
      port: 9080
      targetPort: 9080
    - name: admin
      port: 9180
      targetPort: 9180
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "x-evor.fullname" . }}-vault-config
data:
  vault.hcl: |
    ui = true
    disable_mlock = true
    api_addr = "https://{{ .Values.global.vaultDomain }}"
    cluster_addr = "http://vault:8201"
    storage "raft" {
      path = "/opt/vault/data"
      node_id = "vault-1"
    }
    listener "tcp" {
      address = "0.0.0.0:8200"
      cluster_address = "0.0.0.0:8201"
      tls_disable = true
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "x-evor.fullname" . }}-vault
spec:
  serviceName: {{ include "x-evor.fullname" . }}-vault
  replicas: {{ .Values.resources.vault.replicas }}
  selector:
    matchLabels:
      app: {{ include "x-evor.fullname" . }}-vault
  template:
    metadata:
      labels:
        app: {{ include "x-evor.fullname" . }}-vault
    spec:
      containers:
        - name: vault
          image: {{ .Values.images.vault }}
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          command: ["server","-config=/vault/config/vault.hcl"]
          ports:
            - containerPort: 8200
            - containerPort: 8201
          volumeMounts:
            - name: vault-config
              mountPath: /vault/config/vault.hcl
              subPath: vault.hcl
            - name: vault-data
              mountPath: /opt/vault/data
      volumes:
        - name: vault-config
          configMap:
            name: {{ include "x-evor.fullname" . }}-vault-config
  volumeClaimTemplates:
    - metadata:
        name: vault-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vault
spec:
  selector:
    app: {{ include "x-evor.fullname" . }}-vault
  ports:
    - name: api
      port: 8200
      targetPort: 8200
    - name: cluster
      port: 8201
      targetPort: 8201
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "x-evor.fullname" . }}-console-env
data:
  NODE_ENV: production
  PORT: "3000"
  APP_BASE_URL: https://{{ .Values.global.consoleDomain }}
  NEXT_PUBLIC_APP_BASE_URL: https://{{ .Values.global.consoleDomain }}
  NEXT_PUBLIC_SITE_URL: https://{{ .Values.global.consoleDomain }}
  ACCOUNT_SERVICE_URL: https://{{ .Values.global.accountsDomain }}
  NEXT_PUBLIC_ACCOUNT_SERVICE_URL: https://{{ .Values.global.accountsDomain }}
  SERVER_SERVICE_URL: https://{{ .Values.global.apiDomain }}
  NEXT_PUBLIC_SERVER_SERVICE_URL: https://{{ .Values.global.apiDomain }}
  OPENCLAW_GATEWAY_REMOTE_URL: https://{{ .Values.global.openclawDomain }}
  OPENCLAW_GATEWAY_TOKEN: {{ .Values.global.openclawGatewayToken | quote }}
  VAULT_SERVER_URL: https://{{ .Values.global.vaultDomain }}
  INTERNAL_SERVICE_TOKEN: {{ .Values.global.internalServiceToken | quote }}
---
apiVersion: apps/v1
