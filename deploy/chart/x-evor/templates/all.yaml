            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "x-evor.fullname" . }}-account
spec:
  selector:
    app: {{ include "x-evor.fullname" . }}-account
  ports:
    - name: http
      port: 8080
      targetPort: 8080
