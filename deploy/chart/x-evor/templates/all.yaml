metadata:
  name: {{ include "x-evor.fullname" . }}-console
spec:
  replicas: {{ .Values.resources.console.replicas }}
  selector:
    matchLabels:
      app: {{ include "x-evor.fullname" . }}-console
  template:
    metadata:
      labels:
        app: {{ include "x-evor.fullname" . }}-console
