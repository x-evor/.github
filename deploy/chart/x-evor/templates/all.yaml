---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "x-evor.fullname" . }}-console
spec:
  selector:
    app: {{ include "x-evor.fullname" . }}-console
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "x-evor.fullname" . }}-openclaw
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "x-evor.fullname" . }}-openclaw-env
data:
  HOME: /home/node
  TERM: xterm-256color
  OPENCLAW_GATEWAY_TOKEN: {{ .Values.global.openclawGatewayToken | quote }}
  OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ""
  OPENCLAW_GATEWAY_BIND: lan
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "x-evor.fullname" . }}-openclaw
spec:
  replicas: {{ .Values.resources.openclaw.replicas }}
  selector:
    matchLabels:
      app: {{ include "x-evor.fullname" . }}-openclaw
  template:
    metadata:
      labels:
        app: {{ include "x-evor.fullname" . }}-openclaw
    spec:
      containers:
        - name: openclaw
          image: {{ .Values.images.openclaw }}
          envFrom:
            - configMapRef:
                name: {{ include "x-evor.fullname" . }}-openclaw-env
          command: ["node","dist/index.js","gateway","--bind","lan","--port","18789"]
          ports:
            - containerPort: 18789
            - containerPort: 18790
          volumeMounts:
            - name: openclaw-state
              mountPath: /home/node/.openclaw
      volumes:
        - name: openclaw-state
          persistentVolumeClaim:
            claimName: {{ include "x-evor.fullname" . }}-openclaw
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "x-evor.fullname" . }}-openclaw
spec:
  selector:
    app: {{ include "x-evor.fullname" . }}-openclaw
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
    - name: bridge
      port: 18790
      targetPort: 18790
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "x-evor.fullname" . }}-account-agent
data:
  account-agent.yaml: |
    mode: "agent"
    log:
      level: info
    agent:
      id: "{{ .Values.global.domain }}"
      controllerUrl: "https://{{ .Values.global.accountsDomain }}"
      apiToken: "{{ .Values.global.agentApiToken }}"
      httpTimeout: 15s
      statusInterval: 1m
      syncInterval: 5m
      tls:
        insecureSkipVerify: false
    xray:
      sync:
        enabled: true
        interval: 5m
        targets:
          - name: "xhttp"
            outputPath: "/usr/local/etc/xray/config.json"
            templatePath: "/etc/agent/config/xray.xhttp.template.json"
            validateCommand: []
            restartCommand: []
          - name: "tcp"
            outputPath: "/usr/local/etc/xray/tcp-config.json"
            templatePath: "/etc/agent/config/xray.tcp.template.json"
            validateCommand: []
            restartCommand: []
  xray.xhttp.template.json: |
    { "log": { "loglevel": "debug" }, "inbounds": [ { "listen": "0.0.0.0", "port": 8080, "protocol": "vless", "settings": { "clients": [ { "id": "{{ .Values.global.xrayUuid }}" } ], "decryption": "none" }, "streamSettings": { "network": "xhttp", "xhttpSettings": { "mode": "auto", "path": "/split" } } } ], "outbounds": [ { "tag": "direct", "protocol": "freedom", "settings": {} }, { "tag": "blocked", "protocol": "blackhole", "settings": {} } ], "routing": { "domainStrategy": "AsIs", "rules": [ { "type": "field", "ip": [ "geoip:private" ], "outboundTag": "blocked" } ] } }
  xray.tcp.template.json: |
    { "log": { "loglevel": "warning" }, "routing": { "domainStrategy": "IPIfNonMatch", "rules": [ { "type": "field", "ip": [ "geoip:cn" ], "outboundTag": "block" } ] }, "inbounds": [ { "listen": "0.0.0.0", "port": 1443, "protocol": "vless", "settings": { "clients": [ { "id": "{{ .Values.global.xrayUuid }}", "flow": "xtls-rprx-vision" } ], "decryption": "none", "fallbacks": [ { "dest": "8001", "xver": 1 }, { "alpn": "h2", "dest": "8002", "xver": 1 } ] }, "streamSettings": { "network": "tcp", "security": "tls", "tlsSettings": { "rejectUnknownSni": true, "minVersion": "1.2", "certificates": [ { "ocspStapling": 3600, "certificateFile": "/var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/{{ .Values.global.domain }}/{{ .Values.global.domain }}.crt", "keyFile": "/var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/{{ .Values.global.domain }}/{{ .Values.global.domain }}.key" } ] } }, "sniffing": { "enabled": true, "destOverride": [ "http", "tls" ] } } ], "outbounds": [ { "protocol": "freedom", "tag": "direct" }, { "protocol": "blackhole", "tag": "block" } ], "policy": { "levels": { "0": { "handshake": 2, "connIdle": 120 } } } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "x-evor.fullname" . }}-agent
spec:
  replicas: {{ .Values.resources.agent.replicas }}
  selector:
    matchLabels:
      app: {{ include "x-evor.fullname" . }}-agent
  template:
    metadata:
      labels:
        app: {{ include "x-evor.fullname" . }}-agent
    spec:
      containers:
        - name: agent
          image: {{ .Values.images.agent }}
          command: ["/app/agent-svc-plus","-config","/etc/agent/account-agent.yaml"]
          env:
            - name: AGENT_ID
              value: {{ .Values.global.domain | quote }}
            - name: AGENT_CONTROLLER_URL
              value: {{ printf "https://%s" .Values.global.accountsDomain | quote }}
            - name: AGENT_API_TOKEN
              value: {{ .Values.global.agentApiToken | quote }}
            - name: INTERNAL_SERVICE_TOKEN
              value: {{ .Values.global.internalServiceToken | quote }}
          volumeMounts:
            - name: agent-config
              mountPath: /etc/agent
            - name: agent-xray
              mountPath: /usr/local/etc/xray
      volumes:
        - name: agent-config
          configMap:
            name: {{ include "x-evor.fullname" . }}-account-agent
        - name: agent-xray
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "x-evor.fullname" . }}-xray-config
data:
  config.json: |
    { "log": { "loglevel": "debug" }, "inbounds": [ { "listen": "/dev/shm/xray.sock,0666", "protocol": "vless", "settings": { "clients": [ { "id": "{{ .Values.global.xrayUuid }}" } ], "decryption": "none" }, "streamSettings": { "network": "xhttp", "xhttpSettings": { "mode": "auto", "path": "/split" } } } ], "outbounds": [ { "tag": "direct", "protocol": "freedom", "settings": {} }, { "tag": "blocked", "protocol": "blackhole", "settings": {} } ], "routing": { "domainStrategy": "AsIs", "rules": [ { "type": "field", "ip": [ "geoip:private" ], "outboundTag": "blocked" } ] } }
  tcp-config.json: |
    { "log": { "loglevel": "warning" }, "routing": { "domainStrategy": "IPIfNonMatch", "rules": [ { "type": "field", "ip": [ "geoip:cn" ], "outboundTag": "block" } ] }, "inbounds": [ { "listen": "0.0.0.0", "port": 1443, "protocol": "vless", "settings": { "clients": [ { "id": "{{ .Values.global.xrayUuid }}", "flow": "xtls-rprx-vision" } ], "decryption": "none", "fallbacks": [ { "dest": "8001", "xver": 1 }, { "alpn": "h2", "dest": "8002", "xver": 1 } ] }, "streamSettings": { "network": "tcp", "security": "tls", "tlsSettings": { "rejectUnknownSni": true, "minVersion": "1.2", "certificates": [ { "ocspStapling": 3600, "certificateFile": "/var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/{{ .Values.global.domain }}/{{ .Values.global.domain }}.crt", "keyFile": "/var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/{{ .Values.global.domain }}/{{ .Values.global.domain }}.key" } ] } }, "sniffing": { "enabled": true, "destOverride": [ "http", "tls" ] } } ], "outbounds": [ { "protocol": "freedom", "tag": "direct" }, { "protocol": "blackhole", "tag": "block" } ], "policy": { "levels": { "0": { "handshake": 2, "connIdle": 120 } } } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "x-evor.fullname" . }}-xray
spec:
  replicas: {{ .Values.resources.xray.replicas }}
  selector:
    matchLabels:
      app: {{ include "x-evor.fullname" . }}-xray
  template:
