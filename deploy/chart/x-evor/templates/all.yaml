metadata:
  name: {{ include "x-evor.fullname" . }}-rag-server
spec:
  replicas: {{ .Values.resources.ragServer.replicas }}
  selector:
    matchLabels:
      app: {{ include "x-evor.fullname" . }}-rag-server
  template:
    metadata:
      labels:
        app: {{ include "x-evor.fullname" . }}-rag-server
    spec:
      containers:
        - name: rag-server
          image: local/rag-server:8ca3e271
          env:
            - name: PORT
              value: "8080"
            - name: DB_HOST
              value: "{{ include "x-evor.fullname" . }}-stunnel-client"
            - name: DB_PORT
              value: "15432"
            - name: POSTGRES_DB
              value: knowledge_db
            - name: INTERNAL_SERVICE_TOKEN
              value: {{ .Values.global.internalServiceToken | quote }}
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "x-evor.fullname" . }}-rag-server
spec:
  selector:
    app: {{ include "x-evor.fullname" . }}-rag-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "x-evor.fullname" . }}-stunnel-server
spec:
  replicas: {{ .Values.resources.stunnelServer.replicas }}
  selector:
    matchLabels:
      app: {{ include "x-evor.fullname" . }}-stunnel-server
  template:
    metadata:
      labels:
        app: {{ include "x-evor.fullname" . }}-stunnel-server
    spec:
      containers:
        - name: stunnel-server
          image: {{ .Values.images.stunnelServer }}
          command: ["stunnel","/etc/stunnel/stunnel.conf"]
          ports:
            - containerPort: 5433
          volumeMounts:
            - name: stunnel-conf
              mountPath: /etc/stunnel/stunnel.conf
              subPath: stunnel.conf
            - name: stunnel-cert
              mountPath: /etc/stunnel/certs/server-cert.pem
              subPath: server-cert.pem
            - name: stunnel-key
              mountPath: /etc/stunnel/certs/server-key.pem
              subPath: server-key.pem
      volumes:
        - name: stunnel-conf
          configMap:
            name: {{ include "x-evor.fullname" . }}-stunnel-server
        - name: stunnel-cert
          secret:
            secretName: {{ include "x-evor.fullname" . }}-stunnel-server
            items:
              - key: server-cert.pem
                path: server-cert.pem
        - name: stunnel-key
          secret:
            secretName: {{ include "x-evor.fullname" . }}-stunnel-server
            items:
              - key: server-key.pem
                path: server-key.pem
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "x-evor.fullname" . }}-stunnel-server
type: Opaque
stringData:
  server-cert.pem: |
{{ .Values.global.stunnelServerCertPem | indent 4 }}
  server-key.pem: |
{{ .Values.global.stunnelServerKeyPem | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "x-evor.fullname" . }}-stunnel-server
data:
  stunnel.conf: |
    foreground = yes
    debug = 5
    [postgres-tls-server]
    client = no
    accept = 0.0.0.0:5433
    connect = {{ include "x-evor.fullname" . }}-postgresql:5432
    cert = /etc/stunnel/certs/server-cert.pem
    key = /etc/stunnel/certs/server-key.pem
    sslVersionMin = TLSv1.2
    options = NO_SSLv2
    options = NO_SSLv3
    socket = l:TCP_NODELAY=1
    socket = r:TCP_NODELAY=1
    socket = l:SO_KEEPALIVE=1
    socket = r:SO_KEEPALIVE=1
    TIMEOUTclose = 0
    TIMEOUTidle = 43200
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "x-evor.fullname" . }}-stunnel-server
spec:
  selector:
    app: {{ include "x-evor.fullname" . }}-stunnel-server
  ports:
    - name: tls
      port: 5433
      targetPort: 5433
---
{{- end }}
{{- if .Values.stunnelClient.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "x-evor.fullname" . }}-stunnel-client
spec:
  replicas: {{ .Values.resources.stunnelClient.replicas }}
  selector:
    matchLabels:
      app: {{ include "x-evor.fullname" . }}-stunnel-client
  template:
    metadata:
      labels:
        app: {{ include "x-evor.fullname" . }}-stunnel-client
    spec:
      containers:
        - name: stunnel-client
          image: {{ .Values.images.stunnelClient }}
          env:
            - name: STUNNEL_CLIENT
              value: "yes"
            - name: STUNNEL_SERVICE
              value: postgres-client
            - name: STUNNEL_ACCEPT
              value: "15432"
            - name: STUNNEL_CONNECT
              value: "{{ include "x-evor.fullname" . }}-stunnel-server:5433"
            - name: STUNNEL_VERIFY
              value: "2"
            - name: STUNNEL_VERIFY_CHAIN
              value: "yes"
          ports:
            - containerPort: 15432
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "x-evor.fullname" . }}-stunnel-client
spec:
  selector:
    app: {{ include "x-evor.fullname" . }}-stunnel-client
  ports:
    - name: postgres
      port: 15432
      targetPort: 15432
---
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "x-evor.fullname" . }}-postgresql
data:
  postgresql.conf: |
    listen_addresses = '*'
    port = 5432
    max_connections = 100
    superuser_reserved_connections = 3
    shared_buffers = 256MB
    effective_cache_size = 1GB
    maintenance_work_mem = 64MB
    work_mem = 16MB
    wal_buffers = 16MB
    min_wal_size = 1GB
    max_wal_size = 4GB
    checkpoint_completion_target = 0.9
    wal_compression = on
    random_page_cost = 1.1
    effective_io_concurrency = 200
    default_statistics_target = 100
    log_destination = 'stderr'
    logging_collector = on
    log_directory = 'log'
    log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
    log_rotation_age = 1d
    log_rotation_size = 100MB
    log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
    log_timezone = 'UTC'
    log_checkpoints = on
    log_connections = on
    log_disconnections = on
    log_duration = off
    log_lock_waits = on
    log_statement = 'none'
    log_temp_files = 0
    log_min_duration_statement = 1000
    datestyle = 'iso, mdy'
    timezone = 'UTC'
    lc_messages = 'en_US.utf8'
    lc_monetary = 'en_US.utf8'
    lc_numeric = 'en_US.utf8'
    lc_time = 'en_US.utf8'
    default_text_search_config = 'pg_catalog.english'
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
    CREATE EXTENSION IF NOT EXISTS pg_jieba;
    CREATE EXTENSION IF NOT EXISTS pgmq;
    CREATE EXTENSION IF NOT EXISTS pg_trgm;
    CREATE EXTENSION IF NOT EXISTS hstore;
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "x-evor.fullname" . }}-postgresql
spec:
  serviceName: {{ include "x-evor.fullname" . }}-postgresql
  replicas: {{ .Values.resources.postgresql.replicas }}
  selector:
    matchLabels:
      app: {{ include "x-evor.fullname" . }}-postgresql
  template:
    metadata:
      labels:
        app: {{ include "x-evor.fullname" . }}-postgresql
    spec:
      containers:
        - name: postgres
          image: {{ .Values.images.postgresql }}
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: {{ .Values.global.postgresPassword | quote }}
            - name: POSTGRES_DB
              value: account
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          command: ["postgres","-c","config_file=/etc/postgresql/postgresql.conf"]
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgresql-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: postgresql-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgresql-config
          configMap:
            name: {{ include "x-evor.fullname" . }}-postgresql
        - name: postgresql-init
          configMap:
            name: {{ include "x-evor.fullname" . }}-postgresql
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "x-evor.fullname" . }}-postgresql
spec:
  selector:
    app: {{ include "x-evor.fullname" . }}-postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
