services:
  apisix:
    image: apache/apisix:3.15.0-debian
    container_name: svc-ai-gateway
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${APISIX_HTTP_PORT:-9080}:9080"
    volumes:
      - ./conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./conf/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
